<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a; color: #e0e0e0; min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
    h1 {
      text-align: center; font-size: 28px; margin-bottom: 4px;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; }
    .card {
      background: #12122a; border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px; padding: 20px 16px; text-align: center;
      text-decoration: none; color: inherit; transition: all .2s;
    }
    .card:hover { border-color: #00d4ff; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,212,255,.1); }
    .card .icon { font-size: 36px; margin-bottom: 8px; }
    .card h3 { font-size: 14px; margin-bottom: 4px; }
    .card p { font-size: 11px; color: #888; }
    @media (max-width:400px) { .grid { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Classic Games</h1>
    <p class="sub">8 free HTML5 games</p>
    <div class="grid">
      <a href="/games/tetris/" class="card"><div class="icon">🔲</div><h3>Tetris</h3><p>Classic block puzzle</p></a>
      <a href="/games/snake/" class="card"><div class="icon">🐍</div><h3>Snake</h3><p>Eat & grow</p></a>
      <a href="/games/2048/" class="card"><div class="icon">🎮</div><h3>2048</h3><p>Merge the tiles</p></a>
      <a href="/games/flappy/" class="card"><div class="icon">🐦</div><h3>Flappy Bird</h3><p>Flap to fly</p></a>
      <a href="/games/space/" class="card"><div class="icon">🚀</div><h3>Space Shooter</h3><p>Blast aliens</p></a>
      <a href="/games/ttt/" class="card"><div class="icon">❌</div><h3>Tic Tac Toe</h3><p>vs AI</p></a>
      <a href="/games/memory/" class="card"><div class="icon">🃏</div><h3>Memory</h3><p>Match pairs</p></a>
      <a href="/games/mine/" class="card"><div class="icon">💣</div><h3>Minesweeper</h3><p>Find the mines</p></a>
    </div>
  </div>
</body>
</html>

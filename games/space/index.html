<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-user-select:none;user-select:none}
body{display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',Arial,sans-serif;background:radial-gradient(ellipse at center,#0a0a2a,#000)}
canvas{display:block;cursor:default}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){'use strict';

const W=480,H=720;
let canvas,ctx,game,paused=false,muted=false;
const KEYS={};

// ---- Utilities ----
function rand(a,b){return Math.random()*(b-a)+a}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

// ---- Audio ----
class AudioManager{
  constructor(){this.ctx=null;this.buf={};this.muted=false}
  init(){
    if(this.ctx)return;
    try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){this.ctx=null;return}
    this._genAll();
  }
  _genAll(){
    this._gen('shoot',0.08,t=>{
      const f=800-t/0.08*600;
      return Math.sin(2*Math.PI*f*t)*0.3;
    });
    this._gen('explode',0.4,t=>{
      const f=200-t/0.4*170;
      const n=(Math.random()*2-1)*0.3;
      return (Math.sin(2*Math.PI*f*t)+n)*Math.max(0,1-t/0.4)*0.25;
    });
    this._gen('powerup',0.3,t=>{
      const f=600+t/0.3*600;
      return Math.sin(2*Math.PI*f*t)*Math.max(0,1-t/0.3)*0.25;
    });
    this._gen('hit',0.12,t=>{
      const f=400-t/0.12*350;
      return (Math.random()*2-1)*Math.max(0,1-t/0.12)*0.3;
    });
    this._gen('boss',0.8,t=>{
      const f=60+Math.sin(t*10)*20;
      const e=Math.max(0,1-t/0.8);
      return (Math.sin(2*Math.PI*f*t)>0?0.3:-0.3)*e*0.4;
    });
    this._gen('wave',0.3,t=>{
      const f=400+t/0.3*400;
      return Math.sin(2*Math.PI*f*t*1.5)*Math.max(0,1-t/0.3)*0.2;
    });
    this._gen('gameover',0.8,t=>{
      const f=300-t/0.8*270;
      return (Math.sin(2*Math.PI*f*t)>0?0.25:-0.25)*Math.max(0,1-t/0.8)*0.3;
    });
    this._gen('combo',0.15,t=>{
      const f=800+t/0.15*400;
      return Math.sin(2*Math.PI*f*t)*Math.max(0,1-t/0.15)*0.2;
    });
  }
  _gen(name,dur,fn){
    if(!this.ctx)return;
    const sr=this.ctx.sampleRate,len=Math.ceil(sr*dur);
    const buf=this.ctx.createBuffer(1,len,sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=fn(i/sr,dur);
    this.buf[name]=buf;
  }
  play(name){
    if(this.muted||!this.ctx||!this.buf[name])return;
    if(this.ctx.state==='suspended')this.ctx.resume();
    const s=this.ctx.createBufferSource();
    s.buffer=this.buf[name];
    const g=this.ctx.createGain();
    g.gain.value=0.5;
    s.connect(g);g.connect(this.ctx.destination);
    s.start(0);
  }
}
const audio=new AudioManager();

// ---- Keyboard ----
document.addEventListener('keydown',e=>{
  KEYS[e.key]=true;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='ArrowDown')e.preventDefault();
  if((e.key==='p'||e.key==='P')&&game){paused=!paused;return}
  if((e.key==='Enter'||e.key===' ')&&game&&(game.state==='menu'||game.state==='gameover')){
    e.preventDefault();restartGame();
  }
});
document.addEventListener('keyup',e=>{KEYS[e.key]=false});

// ---- Particle ----
class Particle{
  constructor(x,y,color,vx,vy,size,life,gravity){
    this.x=x;this.y=y;this.color=color;
    this.vx=vx||rand(-4,4);
    this.vy=vy||rand(-4,2);
    this.size=size||rand(2,6);
    this.life=life||randInt(20,50);this.maxLife=this.life;
    this.gravity=gravity!==undefined?gravity:0.08;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;this.life--}
  draw(ctx){
    const a=clamp(this.life/this.maxLife,0,1),s=this.size*a;
    if(s<0.5)return;
    ctx.globalAlpha=a*0.85;
    ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ---- Starfield ----
function createStars(){
  const s=[],layers=[
    {c:60,sp:0.2,sz:[0.5,1],al:[0.2,0.4]},
    {c:40,sp:0.6,sz:[1,1.8],al:[0.3,0.6]},
    {c:20,sp:1.3,sz:[1.5,2.5],al:[0.5,0.9]},
  ];
  for(const l of layers)
    for(let i=0;i<l.c;i++){
      const ba=rand(l.al[0],l.al[1]);
      s.push({x:rand(0,W),y:rand(0,H),sp:l.sp,sz:rand(l.sz[0],l.sz[1]),a:ba,ba:ba,ts:rand(0.02,0.05),tp:rand(0,Math.PI*2)});
    }
  return s;
}
function updateStars(s){
  for(const st of s){
    st.y+=st.sp;
    if(st.y>H){st.y=-2;st.x=rand(0,W)}
    st.a=clamp(st.ba+Math.sin(Date.now()*st.ts+st.tp)*st.ba*0.5,0,1);
  }
}
function drawStars(ctx,s){
  ctx.save();
  for(const st of s){
    ctx.globalAlpha=clamp(st.a,0,1);
    ctx.fillStyle='#fff';
    ctx.fillRect(st.x,st.y,st.sz,st.sz);
  }
  ctx.restore();
}

// ---- Bullet ----
class Bullet{
  constructor(x,y,vx,vy,damage=1,color='#00ffcc'){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.damage=damage;this.color=color;this.r=3;this.alive=true;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    if(this.y<-20||this.y>H+20||this.x<-20||this.x>W+20)this.alive=false;
  }
  draw(ctx){
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r+6);
    g.addColorStop(0,this.color);
    g.addColorStop(0.3,this.color+'88');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r+6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*0.5,0,Math.PI*2);ctx.fill();
  }
}

// ---- Enemy ----
class Enemy{
  constructor(x,y,type,hp=1){
    this.x=x;this.y=y;this.type=type;this.hp=hp;this.maxHp=hp;
    this.w=type==='boss'?80:36;this.h=type==='boss'?56:36;
    this.alive=true;this.flash=0;
    this.shootTimer=randInt(40,100);
    if(type==='boss'){
      this.vy=0.8;this.vx=rand(-1,1);
      this.wAmpl=0;
    }else{
      this.vy=rand(1,2.5);this.vx=0;
      this.wobble=rand(0,Math.PI*2);
      this.wSpd=rand(0.02,0.04);
      this.wAmpl=rand(30,70);
    }
  }
  update(){
    if(this.type==='boss'){
      if(this.y<120)this.y+=this.vy;
      this.x+=Math.sin(Date.now()*0.0015)*0.8;
      this.x=clamp(this.x,40,W-40);
    }else{
      this.wobble+=this.wSpd;
      this.x+=Math.sin(this.wobble)*this.wAmpl*0.008;
      this.y+=this.vy;
    }
    if(this.y>H+50||this.x<-100||this.x>W+100)this.alive=false;
    if(this.flash>0)this.flash--;
    this.shootTimer--;
  }
  draw(ctx){
    ctx.save();ctx.translate(this.x,this.y);
    if(this.type==='boss'){
      ctx.shadowColor='#ff4488';ctx.shadowBlur=20;
      ctx.beginPath();
      ctx.moveTo(40,-26);ctx.lineTo(76,-8);ctx.lineTo(76,20);
      ctx.lineTo(40,30);ctx.lineTo(4,20);ctx.lineTo(4,-8);ctx.closePath();
      const g=ctx.createLinearGradient(0,-26,0,30);
      g.addColorStop(0,'#ff6688');g.addColorStop(0.5,'#cc2255');g.addColorStop(1,'#881133');
      ctx.fillStyle=g;ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#ff0044';ctx.shadowColor='#ff0044';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(20,-6,6,0,Math.PI*2);ctx.arc(60,-6,6,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(18,-8,2,0,Math.PI*2);ctx.arc(58,-8,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff0066';ctx.shadowColor='#ff0066';ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(40,8,8,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      if(this.hp<this.maxHp){
        const bw=72,hpPct=this.hp/this.maxHp;
        ctx.fillStyle='rgba(0,0,0,0.6)';
        ctx.fillRect(-bw/2,-34,bw,6);
        const hg=ctx.createLinearGradient(-bw/2,0,bw/2,0);
        hg.addColorStop(0,'#ff4444');hg.addColorStop(0.5,'#ffaa00');hg.addColorStop(1,'#44ff44');
        ctx.fillStyle=hg;
        ctx.fillRect(-bw/2,-34,bw*hpPct,6);
        ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.5;
        ctx.strokeRect(-bw/2,-34,bw,6);
      }
    }else{
      ctx.shadowColor='#ff3344';ctx.shadowBlur=12;
      ctx.beginPath();
      ctx.moveTo(0,-16);ctx.lineTo(16,-4);ctx.lineTo(12,14);
      ctx.lineTo(0,18);ctx.lineTo(-12,14);ctx.lineTo(-16,-4);ctx.closePath();
      const g=ctx.createLinearGradient(0,-16,0,18);
      g.addColorStop(0,'#ff5566');g.addColorStop(0.5,'#dd2233');g.addColorStop(1,'#991122');
      ctx.fillStyle=this.flash>0?'#fff':g;ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle=this.flash>0?'#ffcccc':'#bb2233';
      ctx.beginPath();
      ctx.moveTo(0,-8);ctx.lineTo(8,0);ctx.lineTo(0,8);ctx.lineTo(-8,0);ctx.closePath();
      ctx.fill();
      ctx.fillStyle=this.flash>0?'#fff':'#ff0044';ctx.shadowColor='#ff0044';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(0,2,3,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }
}

// ---- PowerUp ----
class PowerUp{
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;
    this.vy=1.5;this.alive=true;this.w=28;this.h=28;this.t=rand(0,Math.PI*2);
  }
  update(){this.y+=this.vy;this.t+=0.05;if(this.y>H+30)this.alive=false}
  draw(ctx){
    ctx.save();ctx.translate(this.x,this.y);
    const cols={'S':'#ffcc00','P':'#00ff88','B':'#ff8800'};
    const dcols={'S':'#cc9900','P':'#00aa66','B':'#cc6600'};
    const c=cols[this.type];
    const pulse=1+Math.sin(this.t*2)*0.15,rad=16*pulse;
    ctx.shadowColor=c;ctx.shadowBlur=20;
    const gg=ctx.createRadialGradient(0,0,2,0,0,rad);
    gg.addColorStop(0,c+'cc');gg.addColorStop(0.5,c+'44');gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;
    ctx.beginPath();ctx.arc(0,0,rad,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=dcols[this.type];
    ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;
    ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#000';ctx.shadowBlur=2;
    ctx.fillText(this.type,0,1);
    ctx.restore();
  }
}

// ---- Player ----
class Player{
  constructor(){this.reset()}
  reset(){
    this.x=W/2;this.y=H-60;this.w=40;this.h=48;
    this.speed=5;this.shootDelay=12;this.shootTimer=0;
    this.spread=false;this.shield=false;this.speedBoost=false;
    this.powerTimer=0;this.powerType='';
    this.lives=3;this.invincible=0;this.alive=true;
    this.exhaust=[];this.autoFire=false;this.touchDx=0;
  }
  update(){
    if(!this.alive)return;
    if(this.invincible>0)this.invincible--;
    let dx=0;
    if(KEYS['ArrowLeft']||KEYS['a']||KEYS['A'])dx=-1;
    if(KEYS['ArrowRight']||KEYS['d']||KEYS['D'])dx=1;
    if(this.touchDx){dx=this.touchDx;this.touchDx=0}
    const spd=this.speed*(this.speedBoost?1.8:1);
    this.x+=dx*spd;
    this.x=clamp(this.x,this.w/2,W-this.w/2);
    if(this.shootTimer>0)this.shootTimer--;
    if(KEYS[' ']||this.autoFire){
      if(this.shootTimer===0){this.shoot();this.shootTimer=this.shootDelay}
    }
    if(this.powerTimer>0){
      this.powerTimer--;
      if(this.powerTimer===0){this.spread=false;this.shield=false;this.speedBoost=false;this.powerType=''}
    }
    if(this.alive&&Math.random()<0.6){
      this.exhaust.push(new Particle(this.x+rand(-6,6),this.y+24,rand(0,1)<0.5?'#ff6600':'#ffcc00',rand(-0.3,0.3),rand(1,3),rand(2,4),randInt(10,20),0.02));
    }
    for(let i=this.exhaust.length-1;i>=0;i--){
      this.exhaust[i].update();
      if(this.exhaust[i].life<=0)this.exhaust.splice(i,1);
    }
  }
  shoot(){
    audio.play('shoot');
    if(this.spread){
      game.bullets.push(new Bullet(this.x,this.y-20,0,-8,1,'#00ffcc'));
      game.bullets.push(new Bullet(this.x-8,this.y-16,-2.5,-7,1,'#ffaa00'));
      game.bullets.push(new Bullet(this.x+8,this.y-16,2.5,-7,1,'#ffaa00'));
      game.bullets.push(new Bullet(this.x-16,this.y-12,-5,-5,1,'#ff8800'));
      game.bullets.push(new Bullet(this.x+16,this.y-12,5,-5,1,'#ff8800'));
    }else{
      game.bullets.push(new Bullet(this.x,this.y-24,0,-8,1,'#00ffcc'));
    }
  }
  draw(ctx){
    if(!this.alive)return;
    if(this.invincible>0&&Math.floor(this.invincible/4)%2===0)return;
    ctx.save();ctx.translate(this.x,this.y);
    const eg=ctx.createRadialGradient(0,22,2,0,22,18);
    eg.addColorStop(0,'rgba(255,200,50,0.6)');
    eg.addColorStop(0.4,'rgba(255,100,0,0.3)');
    eg.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=eg;
    ctx.beginPath();ctx.arc(0,22,18,0,Math.PI*2);ctx.fill();
    for(const p of this.exhaust)p.draw(ctx);
    ctx.beginPath();
    ctx.moveTo(0,-22);ctx.lineTo(12,-12);ctx.lineTo(18,8);
    ctx.lineTo(14,22);ctx.lineTo(-14,22);ctx.lineTo(-18,8);
    ctx.lineTo(-12,-12);ctx.closePath();
    const hg=ctx.createLinearGradient(0,-22,0,22);
    hg.addColorStop(0,'#66eeff');hg.addColorStop(0.3,'#00bbff');
    hg.addColorStop(0.7,'#0088cc');hg.addColorStop(1,'#005577');
    ctx.fillStyle=hg;ctx.fill();
    ctx.strokeStyle='#00eeff';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,-18);ctx.lineTo(6,-8);ctx.lineTo(0,-4);ctx.lineTo(-6,-8);ctx.closePath();
    ctx.fillStyle='#88eeff';ctx.fill();
    ctx.strokeStyle='#aaffff';ctx.lineWidth=0.5;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(12,-4);ctx.lineTo(18,8);ctx.lineTo(14,12);ctx.lineTo(10,4);ctx.closePath();
    ctx.fillStyle='#006688';ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-12,-4);ctx.lineTo(-18,8);ctx.lineTo(-14,12);ctx.lineTo(-10,4);ctx.closePath();
    ctx.fillStyle='#006688';ctx.fill();
    ctx.fillStyle='#ffaa00';
    ctx.beginPath();ctx.arc(-8,20,3,0,Math.PI*2);ctx.arc(8,20,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6600';
    ctx.beginPath();ctx.arc(-8,20,1.5,0,Math.PI*2);ctx.arc(8,20,1.5,0,Math.PI*2);ctx.fill();
    if(this.shield){
      ctx.strokeStyle='rgba(0,200,255,0.4)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,32,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(0,200,255,0.15)';ctx.lineWidth=6;
      ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }
}

// ---- Game State ----
function createGame(){
  return{
    player:new Player(),enemies:[],bullets:[],enemyBullets:[],particles:[],powerups:[],
    stars:createStars(),
    score:0,wave:0,enemiesPerWave:5,enemiesSpawned:0,waveDelay:0,
    bossSpawned:false,bossDefeated:true,
    state:'menu',
    highScore:parseInt(localStorage.getItem('spaceshooter_hs')||'0',10),
    flashText:'',flashColor:'#fff',flashTimer:0,
    combo:0,maxCombo:0,comboFlash:0,screenShake:0,
    totalKills:0,totalShots:0,waveAnnounceTimer:0,
  };
}
game=createGame();

// ---- Spawning ----
function spawnEnemy(){
  const isBoss=game.wave%5===0&&!game.bossSpawned&&game.bossDefeated;
  if(isBoss){
    const e=new Enemy(W/2,-40,'boss',10+game.wave*3);
    game.enemies.push(e);
    game.bossSpawned=true;
    game.bossDefeated=false;
    game.enemiesSpawned=game.enemiesPerWave;
    audio.play('boss');
    flashText('WARNING! BOSS!','#ff4488');
    return;
  }
  const hp=Math.min(1+Math.floor(game.wave/3),5);
  game.enemies.push(new Enemy(rand(20,W-20),-20,'normal',hp));
}
function spawnPowerUp(x,y){
  const r=Math.random();
  game.powerups.push(new PowerUp(x,y,r<0.33?'S':r<0.66?'P':'B'));
}
function flashText(t,c){game.flashText=t;game.flashColor=c||'#fff';game.flashTimer=80}

// ---- Collision ----
function circHit(a,b,r1,r2){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy<(r1+r2)*(r1+r2)}

// ---- Explosion ----
function explode(x,y,color,n,spread){
  for(let i=0;i<(n||20);i++){
    const a=(Math.PI*2/n)*i+rand(0,0.4),sp=spread||rand(2,5);
    game.particles.push(new Particle(x,y,color,Math.cos(a)*sp,Math.sin(a)*sp,rand(2,5),randInt(20,40)));
  }
  if(n>20)for(let i=0;i<10;i++){
    const a=rand(0,Math.PI*2),sp=rand(1,3);
    game.particles.push(new Particle(x,y,'#fff',Math.cos(a)*sp,Math.sin(a)*sp,rand(1,3),randInt(10,20)));
  }
  game.screenShake=Math.min(n*0.4,15);
}

// ---- Update ----
function update(){
  if(game.state==='menu')return;
  if(game.state==='gameover'){updateParticles();updateStars(game.stars);return}
  if(paused)return;
  const p=game.player;
  updateStars(game.stars);
  p.update();
  for(let i=game.bullets.length-1;i>=0;i--){
    const b=game.bullets[i];b.update();
    if(!b.alive){game.bullets.splice(i,1);continue}
    for(let j=game.enemies.length-1;j>=0;j--){
      const e=game.enemies[j],eRad=e.type==='boss'?35:15;
      if(circHit(b,e,5,eRad)){
        e.hp-=b.damage;b.alive=false;game.bullets.splice(i,1);e.flash=4;
        explode(b.x,b.y,'#ffcc00',5,2);audio.play('hit');
        if(e.hp<=0){
          if(e.type==='boss'){
            explode(e.x,e.y,'#ff4488',60,8);explode(e.x,e.y,'#ffcc00',30,5);
            game.score+=100+game.wave*30;game.bossDefeated=true;
            for(let k=0;k<3;k++)spawnPowerUp(e.x-30+30*k,e.y);
            flashText('BOSS DEFEATED!','#ff4488');audio.play('explode');game.screenShake=20;game.combo++;
          }else{
            game.score+=10+game.wave;
            explode(e.x,e.y,'#ff3344',20,4);audio.play('explode');game.combo++;
            if(game.combo%5===0)audio.play('combo');
            if(Math.random()<0.15)spawnPowerUp(e.x,e.y);
          }
          game.totalKills++;
          if(game.combo>game.maxCombo)game.maxCombo=game.combo;
          game.comboFlash=20;e.alive=false;game.enemies.splice(j,1);
        }
        break;
      }
    }
  }
  for(let i=game.enemyBullets.length-1;i>=0;i--){
    const b=game.enemyBullets[i];b.update();
    if(!b.alive){game.enemyBullets.splice(i,1);continue}
    if(p.alive&&p.invincible===0&&circHit(b,p,5,16)){
      b.alive=false;game.enemyBullets.splice(i,1);
      if(p.shield){p.shield=false;p.powerTimer=0;p.powerType='';explode(b.x,b.y,'#00ccff',12,3);audio.play('hit');continue}
      hitPlayer();
    }
  }
  if(p.alive&&p.invincible===0){
    for(let i=game.enemies.length-1;i>=0;i--){
      const e=game.enemies[i],eRad=e.type==='boss'?35:15;
      if(circHit(p,e,16,eRad)){
        if(p.shield){p.shield=false;p.powerTimer=0;p.powerType='';explode(e.x,e.y,'#00ccff',15,4);game.enemies.splice(i,1);game.score+=5;continue}
        hitPlayer();break;
      }
    }
  }
  for(let i=game.powerups.length-1;i>=0;i--){
    const u=game.powerups[i];u.update();
    if(!u.alive){game.powerups.splice(i,1);continue}
    if(p.alive&&circHit(p,u,16,14)){
      audio.play('powerup');
      const km={'S':'spread','P':'shield','B':'speed'},tm={'S':'SPREAD','P':'SHIELD','B':'SPEED'};
      const key=km[u.type];
      if(key==='spread')p.spread=true;else if(key==='shield')p.shield=true;else if(key==='speed')p.speedBoost=true;
      p.powerTimer=600;p.powerType=u.type;
      flashText(tm[u.type]+'!','#ffcc00');explode(u.x,u.y,'#ffcc00',15,3);
      game.powerups.splice(i,1);
    }
  }
  for(let i=game.enemies.length-1;i>=0;i--){
    const e=game.enemies[i];e.update();
    if(!e.alive){game.enemies.splice(i,1);continue}
    if(e.shootTimer<=0&&e.y>0){
      e.shootTimer=e.type==='boss'?25:randInt(40,100);
      game.enemyBullets.push(new Bullet(e.x,e.y+12,rand(-0.5,0.5),3,1,'#ff4444'));
      if(e.type==='boss'){
        game.enemyBullets.push(new Bullet(e.x-25,e.y+12,-1.2,3,1,'#ff4444'));
        game.enemyBullets.push(new Bullet(e.x+25,e.y+12,1.2,3,1,'#ff4444'));
        const dx=game.player.x-e.x,dy=game.player.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>0)game.enemyBullets.push(new Bullet(e.x,e.y+12,dx/dist*2,dy/dist*2,1,'#ff88aa'));
      }
    }
  }
  updateParticles();
  if(game.screenShake>0)game.screenShake*=0.9;
  if(game.screenShake<0.1)game.screenShake=0;
  if(game.comboFlash>0)game.comboFlash--;
  if(game.enemies.length===0&&game.bossDefeated){
    if(game.enemiesSpawned<game.enemiesPerWave){
      if(game.waveDelay<=0){spawnEnemy();game.enemiesSpawned++;game.waveDelay=15}else{game.waveDelay--}
    }else{
      game.wave++;
      game.enemiesPerWave=5+game.wave*2;
      game.enemiesSpawned=0;game.bossSpawned=false;game.waveDelay=60;
      game.combo=0;
      audio.play('wave');
      flashText('WAVE '+game.wave,game.wave%5===0?'#ff4488':'#00ffcc');
      game.waveAnnounceTimer=40;
    }
  }
  if(game.flashTimer>0)game.flashTimer--;
  if(game.flashTimer===0)game.flashText='';
}

function hitPlayer(){
  const p=game.player;
  p.lives--;p.invincible=120;
  explode(p.x,p.y,'#00ccff',25,6);p.x=W/2;audio.play('hit');
  if(p.lives<=0){
    p.alive=false;game.state='gameover';audio.play('gameover');
    explode(p.x,p.y,'#00ccff',50,10);explode(p.x,p.y,'#fff',20,6);game.screenShake=25;
    if(game.score>game.highScore){game.highScore=game.score;localStorage.setItem('spaceshooter_hs',game.highScore.toString())}
  }
}

function updateParticles(){
  for(let i=game.particles.length-1;i>=0;i--){
    game.particles[i].update();
    if(game.particles[i].life<=0)game.particles.splice(i,1);
  }
}

// ---- Render ----
function draw(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050510');bg.addColorStop(0.5,'#0a0a2a');bg.addColorStop(1,'#050510');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.save();
  if(game.screenShake>0.5){
    const s=game.screenShake*0.3;
    ctx.translate(rand(-s,s),rand(-s,s));
  }
  drawStars(ctx,game.stars);
  for(const u of game.powerups)u.draw(ctx);
  for(const b of game.bullets)b.draw(ctx);
  for(const b of game.enemyBullets)b.draw(ctx);
  for(const e of game.enemies)e.draw(ctx);
  game.player.draw(ctx);
  for(const p of game.particles)p.draw(ctx);
  ctx.restore();

  // ---- HUD (glass-morphism) ----
  ctx.save();
  ctx.fillStyle='rgba(10,10,30,0.6)';
  ctx.shadowColor='rgba(0,150,255,0.1)';ctx.shadowBlur=10;
  roundRect(ctx,8,8,W-16,44,8);ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,200,255,0.15)';ctx.lineWidth=1;
  roundRect(ctx,8,8,W-16,44,8);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI",Arial,sans-serif';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('SCORE: '+game.score,20,30);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px "Segoe UI",Arial,sans-serif';
  ctx.textAlign='right';
  ctx.fillText('HI: '+game.highScore,W-20,20);
  ctx.fillStyle=game.wave%5===0?'#ff4488':'rgba(255,255,255,0.6)';
  ctx.font='12px "Segoe UI",Arial,sans-serif';
  ctx.fillText('WAVE '+game.wave,W-20,36);
  ctx.restore();

  // Lives
  for(let i=0;i<game.player.lives;i++){
    ctx.fillStyle='#00ccff';ctx.shadowColor='#00ccff';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(22+i*22,66,5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // Power bar
  if(game.player.powerTimer>0&&game.player.powerType){
    const pct=game.player.powerTimer/600;
    const bc={'S':'#ffcc00','P':'#00ff88','B':'#ff8800'}[game.player.powerType]||'#ffcc00';
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.4)';
    roundRect(ctx,10,H-28,200,10,5);ctx.fill();
    ctx.fillStyle=bc;ctx.shadowColor=bc;ctx.shadowBlur=8;
    roundRect(ctx,10,H-28,200*pct,10,5);ctx.fill();
    ctx.restore();
  }

  // Combo
  if(game.combo>1){
    const sc=1+(game.comboFlash>0?Math.sin(game.comboFlash*0.5)*0.1:0);
    ctx.save();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.translate(W/2,90);ctx.scale(sc,sc);
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=game.comboFlash>0?20:10;
    ctx.fillStyle='#ffcc00';ctx.font='bold 22px "Segoe UI",Arial,sans-serif';
    ctx.fillText('COMBO x'+game.combo,0,0);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,204,0,0.3)';ctx.font='10px "Segoe UI",Arial,sans-serif';
    ctx.fillText('KILLS: '+game.totalKills,0,16);
    ctx.restore();
  }

  // Flash text
  if(game.flashTimer>0&&game.flashText){
    const a=clamp(game.flashTimer/60,0,1),sc=1+Math.sin(game.flashTimer*0.3)*0.05;
    ctx.save();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.translate(W/2,H/2-40);ctx.globalAlpha=a;ctx.scale(sc,sc);
    ctx.shadowColor=game.flashColor||'#fff';ctx.shadowBlur=20;
    ctx.fillStyle=game.flashColor||'#fff';ctx.font='bold 40px "Segoe UI",Arial,sans-serif';
    ctx.fillText(game.flashText,0,0);
    ctx.restore();
  }

  // Paused
  if(paused&&game.state==='playing'){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.font='bold 48px "Segoe UI",Arial,sans-serif';
    ctx.fillText('PAUSED',W/2,H/2-20);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='16px "Segoe UI",Arial,sans-serif';
    ctx.fillText('Press P to resume',W/2,H/2+30);
    ctx.restore();
  }

  // Mute button
  const muteX=W-36,muteY=10;
  ctx.save();
  ctx.fillStyle=muted?'rgba(255,100,100,0.3)':'rgba(255,255,255,0.2)';
  roundRect(ctx,muteX,muteY,26,26,6);ctx.fill();
  ctx.fillStyle=muted?'#ff6666':'#aaa';ctx.font='16px "Segoe UI",Arial,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(muted?'\u{1F507}':'\u{1F50A}',muteX+13,muteY+13);
  ctx.restore();

  // Menu
  if(game.state==='menu'){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#00ccff';ctx.shadowBlur=30;
    ctx.fillStyle='#00ccff';ctx.font='bold 56px "Segoe UI",Arial,sans-serif';
    ctx.fillText('SPACE',W/2,180);
    ctx.shadowColor='#ff3344';ctx.shadowBlur=30;
    ctx.fillStyle='#ff3344';ctx.font='bold 56px "Segoe UI",Arial,sans-serif';
    ctx.fillText('SHOOTER',W/2,240);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='16px "Segoe UI",Arial,sans-serif';
    ctx.fillText('\u2190 \u2192 or A/D to move  |  SPACE to shoot',W/2,330);
    ctx.fillText('Drag/Tap on mobile',W/2,360);
    ctx.fillStyle='#ffcc00';ctx.shadowColor='#ffcc00';ctx.shadowBlur=15;
    ctx.font='bold 28px "Segoe UI",Arial,sans-serif';
    ctx.fillText('TAP or PRESS ENTER',W/2,450);
    ctx.shadowBlur=0;
    if(game.highScore>0){ctx.fillStyle='#fff';ctx.font='16px "Segoe UI",Arial,sans-serif';ctx.fillText('HIGH SCORE: '+game.highScore,W/2,500)}
    ctx.restore();
  }

  // Game over
  if(game.state==='gameover'){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#ff3344';ctx.shadowBlur=30;
    ctx.fillStyle='#ff3344';ctx.font='bold 52px "Segoe UI",Arial,sans-serif';
    ctx.fillText('GAME OVER',W/2,200);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(10,10,40,0.6)';ctx.shadowColor='rgba(0,150,255,0.1)';ctx.shadowBlur=10;
    const pw=300,ph=140;
    roundRect(ctx,W/2-pw/2,260,pw,ph,12);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,200,255,0.15)';ctx.lineWidth=1;
    roundRect(ctx,W/2-pw/2,260,pw,ph,12);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 22px "Segoe UI",Arial,sans-serif';
    ctx.fillText('Score: '+game.score,W/2,288);
    if(game.score>=game.highScore&&game.score>0){
      ctx.fillStyle='#ffcc00';ctx.shadowColor='#ffcc00';ctx.shadowBlur=10;
      ctx.font='bold 16px "Segoe UI",Arial,sans-serif';
      ctx.fillText('\u2726 NEW HIGH SCORE! \u2726',W/2,316);
      ctx.shadowBlur=0;
    }
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='14px "Segoe UI",Arial,sans-serif';
    ctx.fillText('Wave: '+game.wave+'  |  Kills: '+game.totalKills+'  |  Max Combo: '+game.maxCombo,W/2,346);
    ctx.fillText('High Score: '+game.highScore,W/2,368);
    ctx.fillStyle='#00ccff';ctx.shadowColor='#00ccff';ctx.shadowBlur=15;
    ctx.font='bold 22px "Segoe UI",Arial,sans-serif';
    ctx.fillText('TAP or PRESS ENTER',W/2,460);
    ctx.restore();
  }
}

function roundRect(ctx,x,y,w,h,r){
  if(r>w/2)r=w/2;
  if(r>h/2)r=h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  return ctx;
}

// ---- Touch ----
let touchId=null,touchStartX=0;
function setupTouch(c){
  c.addEventListener('touchstart',e=>{
    e.preventDefault();
    audio.init();
    if(game.state==='menu'||game.state==='gameover'){restartGame();return}
    if(paused)return;
    if(touchId===null){
      const t=e.changedTouches[0];
      touchId=t.identifier;touchStartX=t.clientX;
      game.player.autoFire=true;
    }
  },{passive:false});
  c.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(game.state!=='playing'||paused||touchId===null)return;
    const t=Array.from(e.changedTouches).find(t=>t.identifier===touchId);
    if(!t)return;
    const dx=(t.clientX-touchStartX)/canvas.clientWidth*W;
    game.player.touchDx=dx*0.3;
    touchStartX=t.clientX;
  },{passive:false});
  c.addEventListener('touchend',e=>{
    e.preventDefault();
    if(Array.from(e.changedTouches).find(t=>t.identifier===touchId)){
      touchId=null;game.player.autoFire=false;
    }
  },{passive:false});
  c.addEventListener('touchcancel',()=>{touchId=null;game.player.autoFire=false});
  c.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    const sx=(cx/canvas.clientWidth)*W,sy=(cy/canvas.clientHeight)*H;
    if(sx>=W-36&&sx<=W-10&&sy>=10&&sy<=36){muted=!muted;audio.muted=muted;return}
    if(game.state==='menu'||game.state==='gameover'){restartGame();return}
  });
}

// ---- Init ----
function restartGame(){
  const hs=game.highScore;
  game=createGame();
  game.highScore=hs;
  game.state='playing';
  audio.init();
  touchId=null;
}

function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.style.width=Math.floor(W*s)+'px';
  canvas.style.height=Math.floor(H*s)+'px';
}

function loop(){update();draw();requestAnimationFrame(loop)}

// ---- Boot ----
canvas=document.getElementById('c');
canvas.width=W;canvas.height=H;
ctx=canvas.getContext('2d');
setupTouch(canvas);
audio.init();
resize();
window.addEventListener('resize',resize);
loop();

})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird - Neon</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas {
    display: block;
    background: #0f0f1a;
    border-radius: 8px;
    box-shadow:
        0 0 30px rgba(0, 255, 200, 0.08),
        0 0 60px rgba(0, 255, 200, 0.04),
        inset 0 0 30px rgba(0, 0, 0, 0.5);
    image-rendering: pixelated;
    max-width: 100vw;
    max-height: 100dvh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 600;
const BASE_W = 400;
const BASE_H = 600;

const GRAVITY = 0.45;
const FLAP_VEL = -6.5;
const MAX_FALL = 10;
const PIPE_W = 56;
const PIPE_SPEED_INIT = 2;
const PIPE_SPACING = 220;
const GAP_INIT = 150;
const GAP_MIN = 90;
const GAP_SHRINK = 3;
const SPEED_INCR = 0.08;
const GROUND_H = 80;
const GROUND_SCROLL_SPEED = 1.5;
const MAX_ANGLE = 80;
const MIN_ANGLE = -25;

let scale = 1;
let offX = 0;
let offY = 0;

function resize() {
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const sx = winW / BASE_W;
    const sy = winH / BASE_H;
    scale = Math.min(sx, sy);
    const cw = Math.floor(BASE_W * scale);
    const ch = Math.floor(BASE_H * scale);
    canvas.width = cw;
    canvas.height = ch;
    offX = (winW - cw) / 2;
    offY = (winH - ch) / 2;
    canvas.style.marginLeft = offX + 'px';
    canvas.style.marginTop = offY + 'px';
    ctx.imageSmoothingEnabled = true;
}
resize();
window.addEventListener('resize', resize);

let gameState = 'idle';
let score = 0;
let highScore = parseInt(localStorage.getItem('flappy_neon_high')) || 0;
let frame = 0;

const bird = { x: 90, y: 260, w: 30, h: 24, vel: 0, rot: 0 };

let pipes = [];
let particles = [];
let groundOffset = 0;

let gapCurrent = GAP_INIT;
let speedCurrent = PIPE_SPEED_INIT;
let pipeTimer = 0;

let starField = [];
for (let i = 0; i < 80; i++) {
    starField.push({ x: Math.random() * BASE_W, y: Math.random() * BASE_H * 0.75, r: Math.random() * 1.5 + 0.5, b: Math.random() * 0.5 + 0.5 });
}

function reset() {
    bird.y = 260;
    bird.vel = 0;
    bird.rot = 0;
    pipes = [];
    particles = [];
    score = 0;
    gapCurrent = GAP_INIT;
    speedCurrent = PIPE_SPEED_INIT;
    pipeTimer = 0;
    groundOffset = 0;
    frame = 0;
}

function flap() {
    if (gameState === 'idle') {
        gameState = 'playing';
        reset();
        bird.vel = FLAP_VEL;
        spawnParticles(bird.x + bird.w / 2, bird.y + bird.h / 2);
        return;
    }
    if (gameState === 'playing') {
        bird.vel = FLAP_VEL;
        spawnParticles(bird.x + bird.w / 2, bird.y + bird.h / 2);
    }
    if (gameState === 'gameover') {
        reset();
        gameState = 'idle';
    }
}

function spawnParticles(x, y) {
    for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 2.5 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 1,
            life: 1,
            decay: Math.random() * 0.025 + 0.01,
            size: Math.random() * 4 + 2,
            hue: Math.random() * 60 + 160,
        });
    }
}

function spawnPipe() {
    const groundTop = BASE_H - GROUND_H;
    const minY = 50;
    const maxY = groundTop - gapCurrent - 50;
    const gapY = Math.random() * (maxY - minY) + minY;
    pipes.push({
        x: BASE_W,
        gapY,
        gapH: gapCurrent,
        scored: false,
    });
}

function update(dt) {
    frame++;

    if (gameState === 'idle') {
        bird.y = 260 + Math.sin(frame * 0.04) * 6;
        bird.rot = 0;
        return;
    }

    if (gameState === 'playing') {
        bird.vel += GRAVITY;
        if (bird.vel > MAX_FALL) bird.vel = MAX_FALL;
        bird.y += bird.vel;

        bird.rot = bird.vel * 5;
        if (bird.rot > MAX_ANGLE) bird.rot = MAX_ANGLE;
        if (bird.rot < MIN_ANGLE) bird.rot = MIN_ANGLE;

        pipeTimer -= dt;
        if (pipeTimer <= 0) {
            spawnPipe();
            pipeTimer = PIPE_SPACING / speedCurrent;
        }

        const groundTop = BASE_H - GROUND_H;
        for (let i = pipes.length - 1; i >= 0; i--) {
            const p = pipes[i];
            p.x -= speedCurrent * dt;

            if (p.x + PIPE_W < 0) {
                pipes.splice(i, 1);
                continue;
            }

            if (!p.scored && p.x + PIPE_W < bird.x) {
                p.scored = true;
                score++;
                gapCurrent = Math.max(GAP_MIN, GAP_INIT - score * GAP_SHRINK);
                speedCurrent += SPEED_INCR;
            }

            const bx = bird.x;
            const by = bird.y;
            const bw = bird.w;
            const bh = bird.h;
            const birdRight = bx + bw;
            const birdBottom = by + bh;

            const topPipeRect = { x: p.x, y: 0, w: PIPE_W, h: p.gapY };
            const botPipeRect = { x: p.x, y: p.gapY + p.gapH, w: PIPE_W, h: BASE_H - p.gapY - p.gapH };

            if (
                (bx < topPipeRect.x + topPipeRect.w &&
                 birdRight > topPipeRect.x &&
                 by < topPipeRect.h) ||
                (bx < botPipeRect.x + botPipeRect.w &&
                 birdRight > botPipeRect.x &&
                 birdBottom > botPipeRect.y)
            ) {
                gameOver();
            }
        }

        if (bird.y + bird.h > groundTop) {
            bird.y = groundTop - bird.h;
            gameOver();
        }
        if (bird.y < -10) {
            bird.y = -10;
            bird.vel = 0;
        }

        groundOffset = (groundOffset + GROUND_SCROLL_SPEED * dt) % 24;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= p.decay;
        p.size *= 0.98;
        if (p.life <= 0 || p.size < 0.3) {
            particles.splice(i, 1);
        }
    }
}

function gameOver() {
    gameState = 'gameover';
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('flappy_neon_high', highScore);
    }
}

function draw() {
    ctx.save();
    ctx.scale(scale, scale);

    // background
    const bg = ctx.createLinearGradient(0, 0, 0, BASE_H);
    bg.addColorStop(0, '#0a0a18');
    bg.addColorStop(0.5, '#0f0a1a');
    bg.addColorStop(1, '#0a0f12');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, BASE_W, BASE_H);

    // stars
    for (const s of starField) {
        const flicker = 0.7 + 0.3 * Math.sin(frame * 0.03 * s.b + s.x);
        ctx.globalAlpha = flicker * 0.6;
        ctx.fillStyle = '#c8f0ff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    const groundTop = BASE_H - GROUND_H;

    if (gameState !== 'idle') {
        // pipes
        for (const p of pipes) {
            ctx.save();
            ctx.shadowColor = '#00ffaa';
            ctx.shadowBlur = 12;
            const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
            grad.addColorStop(0, '#00dd88');
            grad.addColorStop(0.3, '#00ffaa');
            grad.addColorStop(0.7, '#00ffaa');
            grad.addColorStop(1, '#009966');
            ctx.fillStyle = grad;

            // top pipe
            ctx.fillRect(p.x, 0, PIPE_W, p.gapY);
            // top cap
            ctx.fillRect(p.x - 5, p.gapY - 20, PIPE_W + 10, 20);

            // bottom pipe
            ctx.fillRect(p.x, p.gapY + p.gapH, PIPE_W, BASE_H - p.gapY - p.gapH);
            // bottom cap
            ctx.fillRect(p.x - 5, p.gapY + p.gapH, PIPE_W + 10, 20);

            // pipe inner glow
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.15)';
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x + 4, 4, PIPE_W - 8, p.gapY - 4);
            ctx.strokeRect(p.x + 4, p.gapY + p.gapH + 4, PIPE_W - 8, BASE_H - p.gapY - p.gapH - GROUND_H - 4);

            ctx.restore();
        }
    }

    // ground
    ctx.save();
    ctx.shadowColor = '#00ffaa';
    ctx.shadowBlur = 10;
    const groundGrad = ctx.createLinearGradient(0, groundTop, 0, BASE_H);
    groundGrad.addColorStop(0, '#0a1a14');
    groundGrad.addColorStop(0.3, '#0f2a1f');
    groundGrad.addColorStop(1, '#06120e');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, groundTop, BASE_W, GROUND_H);

    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(0, 255, 170, 0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = -groundOffset; i < BASE_W + 24; i += 24) {
        ctx.moveTo(i, groundTop + 8);
        ctx.lineTo(i + 12, groundTop + 2);
        ctx.lineTo(i + 24, groundTop + 8);
    }
    ctx.stroke();

    ctx.strokeStyle = 'rgba(0, 255, 200, 0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = -groundOffset; i < BASE_W + 24; i += 24) {
        ctx.moveTo(i, groundTop + 20);
        ctx.lineTo(i + 12, groundTop + 14);
        ctx.lineTo(i + 24, groundTop + 20);
    }
    ctx.stroke();

    // subtle glow line at ground top
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00ffaa';
    ctx.strokeStyle = 'rgba(0, 255, 170, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, groundTop);
    ctx.lineTo(BASE_W, groundTop);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // particles
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life * 0.8;
        ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
        ctx.shadowBlur = 10;
        ctx.fillStyle = `hsl(${p.hue}, 100%, 70%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    ctx.globalAlpha = 1;

    // bird
    ctx.save();
    ctx.translate(bird.x + bird.w / 2, bird.y + bird.h / 2);
    ctx.rotate(bird.rot * Math.PI / 180);
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 20;

    // bird body gradient
    const bodyGrad = ctx.createLinearGradient(-bird.w / 2, -bird.h / 2, bird.w / 2, bird.h / 2);
    bodyGrad.addColorStop(0, '#00e5ff');
    bodyGrad.addColorStop(0.5, '#00ffcc');
    bodyGrad.addColorStop(1, '#00ccaa');
    ctx.fillStyle = bodyGrad;

    // rounded body
    const bx = -bird.w / 2;
    const by = -bird.h / 2;
    const r = 6;
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + bird.w - r, by);
    ctx.quadraticCurveTo(bx + bird.w, by, bx + bird.w, by + r);
    ctx.lineTo(bx + bird.w, by + bird.h - r);
    ctx.quadraticCurveTo(bx + bird.w, by + bird.h, bx + bird.w - r, by + bird.h);
    ctx.lineTo(bx + r, by + bird.h);
    ctx.quadraticCurveTo(bx, by + bird.h, bx, by + bird.h - r);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.closePath();
    ctx.fill();

    // inner glow
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.ellipse(2, -2, bird.w * 0.25, bird.h * 0.3, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // eye
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bird.w * 0.2, -bird.h * 0.15, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(bird.w * 0.22, -bird.h * 0.15, 2.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bird.w * 0.15, -bird.h * 0.22, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // beak
    ctx.fillStyle = '#ffaa33';
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(bird.w * 0.4, 0);
    ctx.lineTo(bird.w * 0.4 + 12, 2);
    ctx.lineTo(bird.w * 0.4, 5);
    ctx.closePath();
    ctx.fill();

    // wing
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0, 180, 220, 0.6)';
    ctx.beginPath();
    ctx.ellipse(-2, 3, bird.w * 0.35, bird.h * 0.3, 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // score
    if (gameState === 'playing' || gameState === 'gameover') {
        ctx.save();
        ctx.shadowColor = '#00ffaa';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#00ffaa';
        ctx.font = 'bold 42px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(score, BASE_W / 2, 40);
        ctx.restore();
    }

    // idle screen
    if (gameState === 'idle') {
        ctx.save();
        ctx.shadowColor = '#00ffaa';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#00ffaa';
        ctx.font = 'bold 34px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('FLAPPY', BASE_W / 2, BASE_H * 0.22);
        ctx.fillStyle = '#00e5ff';
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.fillText('NEON', BASE_W / 2, BASE_H * 0.22 + 42);

        ctx.shadowBlur = 8;
        ctx.fillStyle = 'rgba(0, 255, 170, 0.5)';
        ctx.font = '16px "Courier New", monospace';
        const pulse = 0.7 + 0.3 * Math.sin(frame * 0.05);
        ctx.globalAlpha = pulse;
        ctx.fillText('TAP or SPACE to start', BASE_W / 2, BASE_H * 0.6);
        ctx.restore();

        if (highScore > 0) {
            ctx.save();
            ctx.fillStyle = 'rgba(0, 255, 170, 0.3)';
            ctx.font = '14px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('HIGH: ' + highScore, BASE_W / 2, BASE_H - GROUND_H - 12);
            ctx.restore();
        }
    }

    // game over
    if (gameState === 'gameover') {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        ctx.fillRect(0, 0, BASE_W, BASE_H);

        ctx.shadowColor = '#ff3366';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#ff3366';
        ctx.font = 'bold 36px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GAME OVER', BASE_W / 2, BASE_H * 0.32);

        ctx.shadowColor = '#00ffaa';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#fff';
        ctx.font = '22px "Courier New", monospace';
        ctx.fillText('Score: ' + score, BASE_W / 2, BASE_H * 0.42);

        if (score === highScore && score > 0) {
            ctx.shadowColor = '#ffcc00';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ffcc00';
            ctx.font = '18px "Courier New", monospace';
            ctx.fillText('★ NEW BEST ★', BASE_W / 2, BASE_H * 0.48);
        } else {
            ctx.shadowColor = 'rgba(0, 255, 170, 0.5)';
            ctx.shadowBlur = 8;
            ctx.fillStyle = 'rgba(0, 255, 170, 0.5)';
            ctx.font = '16px "Courier New", monospace';
            ctx.fillText('Best: ' + highScore, BASE_W / 2, BASE_H * 0.48);
        }

        ctx.shadowBlur = 8;
        ctx.fillStyle = 'rgba(0, 255, 170, 0.6)';
        ctx.font = '16px "Courier New", monospace';
        const pulse = 0.6 + 0.4 * Math.sin(frame * 0.06);
        ctx.globalAlpha = pulse;
        ctx.fillText('TAP or SPACE to restart', BASE_W / 2, BASE_H * 0.58);
        ctx.restore();
    }

    ctx.restore();
}

let lastTime = 0;
function loop(time) {
    const dt = Math.min((time - lastTime) / 16.667, 3);
    lastTime = time;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flap();
    }
});

requestAnimationFrame((time) => {
    lastTime = time;
    loop(time);
});
</script>
</body>
</html>

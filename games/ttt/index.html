<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a12;color:#e0e0e0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.game{display:flex;flex-direction:column;align-items:center;gap:clamp(12px,3vw,24px);padding:16px;width:100%;max-width:480px}
.header{display:flex;justify-content:space-between;align-items:center;width:100%}
.header h1{font-size:clamp(1.1rem,4vw,1.5rem);font-weight:700;color:#c084fc;text-shadow:0 0 20px rgba(192,132,252,.4)}
.scores{display:flex;gap:clamp(6px,2vw,12px);font-size:clamp(.75rem,2.5vw,.9rem)}
.scores span{padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.scores .wins{color:#22c55e;border-color:rgba(34,197,94,.25)}
.scores .losses{color:#ef4444;border-color:rgba(239,68,68,.25)}
.scores .draws{color:#f59e0b;border-color:rgba(245,158,11,.25)}
.turn{font-size:clamp(.85rem,3vw,1.05rem);font-weight:600;color:#94a3b8}
.turn span{color:#c084fc}.turn span.ai{color:#f472b6}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(4px,1.2vw,8px);width:100%;aspect-ratio:1;max-width:400px}
.cell{position:relative;display:flex;justify-content:center;align-items:center;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.06);border-radius:clamp(8px,2vw,14px);cursor:pointer;transition:background .15s,border-color .2s,transform .1s;-webkit-tap-highlight-color:transparent;aspect-ratio:1}
.cell:active{transform:scale(.94)}
.cell:hover:not(.taken):not(.game-over){background:rgba(192,132,252,.06);border-color:rgba(192,132,252,.2)}
.cell.taken{cursor:default}
.cell.win-cell{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.35)}
.cell.draw-cell{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);animation:pulse 1.2s ease-in-out}
.cell .mark{pointer-events:none;font-weight:800;display:flex;justify-content:center;align-items:center}
.cell .mark-x{font-size:clamp(2.2rem,10vw,3.2rem);color:#c084fc;text-shadow:0 0 18px rgba(192,132,252,.7),0 0 40px rgba(192,132,252,.3);animation:xPop .35s cubic-bezier(.34,1.56,.64,1)}
.cell .mark-o{font-size:clamp(2rem,9vw,3rem);color:#f472b6;text-shadow:0 0 18px rgba(244,114,182,.7),0 0 40px rgba(244,114,182,.3);animation:oPop .35s cubic-bezier(.34,1.56,.64,1)}
.controls{display:flex;gap:clamp(8px,2.5vw,16px);width:100%;flex-wrap:wrap;justify-content:center}
.btn{padding:clamp(8px,2vw,12px) clamp(16px,5vw,28px);border:none;border-radius:10px;font-size:clamp(.8rem,2.8vw,1rem);font-weight:600;cursor:pointer;transition:transform .12s,box-shadow .2s;touch-action:manipulation}
.btn:active{transform:scale(.94)}
.btn-new{background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;box-shadow:0 0 20px rgba(192,132,252,.25)}
.btn-new:hover{box-shadow:0 0 30px rgba(192,132,252,.4)}
.difficulty{display:flex;gap:6px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px}
.diff-btn{padding:clamp(6px,1.5vw,10px) clamp(12px,3vw,20px);border:none;border-radius:8px;font-size:clamp(.75rem,2.5vw,.9rem);font-weight:600;cursor:pointer;background:transparent;color:#64748b;transition:all .2s}
.diff-btn.active{background:rgba(192,132,252,.15);color:#c084fc;box-shadow:0 0 12px rgba(192,132,252,.15)}
.diff-btn:hover:not(.active){color:#94a3b8}
.result-overlay{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;opacity:0;pointer-events:none;transition:opacity .35s}
.result-overlay.show{opacity:1;pointer-events:auto}
.result-box{background:#14141f;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:clamp(24px,6vw,40px);text-align:center;max-width:340px;width:90%;transform:scale(.85);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.result-overlay.show .result-box{transform:scale(1)}
.result-box h2{font-size:clamp(1.4rem,5vw,1.9rem);margin-bottom:8px}
.result-box .result-text{font-size:clamp(1rem,3.5vw,1.2rem);color:#94a3b8;margin-bottom:20px}
.result-box .btn-new{width:100%;padding:12px}
.win-title{color:#22c55e;text-shadow:0 0 30px rgba(34,197,94,.4)}
.lose-title{color:#ef4444;text-shadow:0 0 30px rgba(239,68,68,.4)}
.draw-title{color:#f59e0b;text-shadow:0 0 30px rgba(245,158,11,.4)}
.win-line{position:absolute;pointer-events:none;z-index:10}
.win-line svg{position:absolute;top:0;left:0;width:100%;height:100%}
.win-line line{stroke:#22c55e;stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 8px rgba(34,197,94,.6));stroke-dasharray:1000;stroke-dashoffset:1000;animation:drawLine .6s ease-out forwards}
@keyframes drawLine{to{stroke-dashoffset:0}}
@keyframes xPop{0%{transform:scale(0) rotate(-45deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes oPop{0%{transform:scale(0) rotate(45deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@media(max-width:400px){.scores span{padding:3px 7px;font-size:.7rem}}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <h1>Tic Tac Toe</h1>
    <div class="scores">
      <span class="wins">W <span id="scoreWins">0</span></span>
      <span class="losses">L <span id="scoreLosses">0</span></span>
      <span class="draws">D <span id="scoreDraws">0</span></span>
    </div>
  </div>
  <div class="turn"><span id="turnIcon">&#9679;</span> <span id="turnText">Your turn</span></div>
  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
  <div class="controls">
    <div class="difficulty">
      <button class="diff-btn" data-diff="easy">Easy</button>
      <button class="diff-btn active" data-diff="hard">Hard</button>
    </div>
    <button class="btn btn-new" id="btnNew">New Game</button>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <h2 class="result-title" id="resultTitle">You Win!</h2>
    <div class="result-text" id="resultText">Great job!</div>
    <button class="btn btn-new" id="btnRematch">Play Again</button>
  </div>
</div>
<script>
(function(){
const BOARD_SIZE=9;
const WIN_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const HUMAN='X',AI='O',EMPTY='';

let board=Array(BOARD_SIZE).fill(EMPTY);
let gameOver=false;
let difficulty='hard';
let scores={wins:0,losses:0,draws:0};
let aiThinking=false;

const boardEl=document.getElementById('board');
const cells=[...document.querySelectorAll('.cell')];
const scoreWins=document.getElementById('scoreWins');
const scoreLosses=document.getElementById('scoreLosses');
const scoreDraws=document.getElementById('scoreDraws');
const turnIcon=document.getElementById('turnIcon');
const turnText=document.getElementById('turnText');
const resultOverlay=document.getElementById('resultOverlay');
const resultTitle=document.getElementById('resultTitle');
const resultText=document.getElementById('resultText');
const btnNew=document.getElementById('btnNew');
const btnRematch=document.getElementById('btnRematch');
const diffBtns=document.querySelectorAll('.diff-btn');

function loadScores(){
  try{
    const d=localStorage.getItem('ttt_scores');
    if(d){const p=JSON.parse(d);scores={wins:p.wins||0,losses:p.losses||0,draws:p.draws||0}}
  }catch(e){}
}
function saveScores(){
  try{localStorage.setItem('ttt_scores',JSON.stringify(scores))}catch(e){}
}
function updateScoreDisplay(){
  scoreWins.textContent=scores.wins;
  scoreLosses.textContent=scores.losses;
  scoreDraws.textContent=scores.draws;
}

function setTurn(msg,isAI){
  turnText.textContent=msg;
  turnIcon.innerHTML=isAI?'<span style="color:#f472b6">&#9711;</span>':'<span style="color:#c084fc">&#10005;</span>';
}

function resetGame(){
  board=Array(BOARD_SIZE).fill(EMPTY);
  gameOver=false;
  aiThinking=false;
  cells.forEach(c=>{c.classList.remove('taken','win-cell','draw-cell');c.innerHTML=''});
  document.querySelectorAll('.win-line').forEach(el=>el.remove());
  resultOverlay.classList.remove('show');
  setTurn('Your turn',false);
}

function getWinner(b){
  for(const [a,b_,c] of WIN_LINES){
    if(b[a]&&b[a]===b[b_]&&b[a]===b[c])return{winner:b[a],line:[a,b_,c]};
  }
  if(b.every(c=>c!==EMPTY))return{winner:'draw',line:null};
  return null;
}

function getAvailable(b){return b.reduce((a,c,i)=>c===EMPTY?[...a,i]:a,[])}

function minimax(b,depth,isMaximizing,alpha,beta){
  const result=getWinner(b);
  if(result){
    if(result.winner===AI)return 10-depth;
    if(result.winner===HUMAN)return depth-10;
    if(result.winner==='draw')return 0;
  }
  const avail=getAvailable(b);
  if(isMaximizing){
    let best=-Infinity;
    for(const i of avail){
      b[i]=AI;
      const score=minimax(b,depth+1,false,alpha,beta);
      b[i]=EMPTY;
      best=Math.max(best,score);
      alpha=Math.max(alpha,score);
      if(beta<=alpha)break;
    }
    return best;
  }else{
    let best=Infinity;
    for(const i of avail){
      b[i]=HUMAN;
      const score=minimax(b,depth+1,true,alpha,beta);
      b[i]=EMPTY;
      best=Math.min(best,score);
      beta=Math.min(beta,score);
      if(beta<=alpha)break;
    }
    return best;
  }
}

function getBestMove(b){
  let bestScore=-Infinity,bestMove=null;
  const avail=getAvailable(b);
  for(const i of avail){
    b[i]=AI;
    const score=minimax(b,0,false,-Infinity,Infinity);
    b[i]=EMPTY;
    if(score>bestScore){bestScore=score;bestMove=i}
  }
  return bestMove;
}

function getRandomMove(b){
  const avail=getAvailable(b);
  if(!avail.length)return null;
  return avail[Math.floor(Math.random()*avail.length)];
}

function showWinLine(line){
  if(!line)return;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','win-line');
  svg.style.position='absolute';
  svg.style.top='0';
  svg.style.left='0';
  svg.style.width='100%';
  svg.style.height='100%';
  svg.style.pointerEvents='none';
  svg.style.zIndex='10';
  const boardRect=boardEl.getBoundingClientRect();
  const cellRects=line.map(i=>cells[i].getBoundingClientRect());
  const x1=((cellRects[0].left-boardRect.left)+(cellRects[0].right-boardRect.left))/2;
  const y1=((cellRects[0].top-boardRect.top)+(cellRects[0].bottom-boardRect.top))/2;
  const x2=((cellRects[2].left-boardRect.left)+(cellRects[2].right-boardRect.left))/2;
  const y2=((cellRects[2].top-boardRect.top)+(cellRects[2].bottom-boardRect.top))/2;
  const pct=100/boardRect.width;
  const lineEl=document.createElementNS('http://www.w3.org/2000/svg','line');
  lineEl.setAttribute('x1',(x1*pct)+'%');
  lineEl.setAttribute('y1',(y1*pct)+'%');
  lineEl.setAttribute('x2',(x2*pct)+'%');
  lineEl.setAttribute('y2',(y2*pct)+'%');
  svg.appendChild(lineEl);
  boardEl.appendChild(svg);
}

function handleGameEnd(result){
  gameOver=true;
  if(result.winner===HUMAN){
    scores.wins++;
    cells.forEach(c=>c.classList.add('game-over'));
    cells[result.line[0]].classList.add('win-cell');
    cells[result.line[1]].classList.add('win-cell');
    cells[result.line[2]].classList.add('win-cell');
    showWinLine(result.line);
    setTimeout(()=>{resultTitle.textContent='You Win!';resultTitle.className='result-title win-title';resultText.textContent='Perfect play!';resultOverlay.classList.add('show')},400);
  }else if(result.winner===AI){
    scores.losses++;
    cells.forEach(c=>c.classList.add('game-over'));
    cells[result.line[0]].classList.add('win-cell');
    cells[result.line[1]].classList.add('win-cell');
    cells[result.line[2]].classList.add('win-cell');
    showWinLine(result.line);
    setTimeout(()=>{resultTitle.textContent='You Lose!';resultTitle.className='result-title lose-title';resultText.textContent='AI wins this time.';resultOverlay.classList.add('show')},400);
  }else{
    scores.draws++;
    cells.forEach(c=>{c.classList.add('taken','draw-cell')});
    setTimeout(()=>{resultTitle.textContent='Draw!';resultTitle.className='result-title draw-title';resultText.textContent='Close game!';resultOverlay.classList.add('show')},300);
  }
  saveScores();
  updateScoreDisplay();
  if(result.winner!=='draw')setTurn(result.winner===AI?'AI wins!':'You win!',result.winner===AI);
  else setTurn("It's a draw!",false);
}

function placeMark(index,player){
  if(board[index]!==EMPTY||gameOver||aiThinking)return false;
  board[index]=player;
  const cell=cells[index];
  cell.classList.add('taken');
  const mark=document.createElement('span');
  mark.className='mark';
  if(player===HUMAN){
    mark.innerHTML='<span class="mark-x">&#10005;</span>';
  }else{
    mark.innerHTML='<span class="mark-o">&#9711;</span>';
  }
  cell.appendChild(mark);
  return true;
}

function aiMove(){
  if(gameOver||aiThinking)return;
  aiThinking=true;
  setTurn('AI thinking...',true);
  setTimeout(()=>{
    if(gameOver){aiThinking=false;return}
    const move=difficulty==='easy'?getRandomMove([...board]):getBestMove([...board]);
    if(move===null){aiThinking=false;return}
    placeMark(move,AI);
    const result=getWinner(board);
    if(result){handleGameEnd(result);aiThinking=false;return}
    setTurn('Your turn',false);
    aiThinking=false;
  },280+Math.random()*220);
}

function handleCellClick(e){
  const cell=e.currentTarget;
  const i=parseInt(cell.dataset.i);
  if(board[i]!==EMPTY||gameOver||aiThinking)return;
  placeMark(i,HUMAN);
  const result=getWinner(board);
  if(result){handleGameEnd(result);return}
  aiMove();
}

loadScores();
updateScoreDisplay();
setTurn('Your turn',false);

cells.forEach(c=>c.addEventListener('click',handleCellClick));
cells.forEach(c=>c.addEventListener('touchend',function(e){e.preventDefault();this.click()}));

btnNew.addEventListener('click',resetGame);
btnRematch.addEventListener('click',resetGame);

diffBtns.forEach(b=>{
  b.addEventListener('click',function(){
    diffBtns.forEach(d=>d.classList.remove('active'));
    this.classList.add('active');
    difficulty=this.dataset.diff;
  });
});
})();
</script>
</body>
</html>

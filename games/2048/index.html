<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#0b0a16;
  color:#e8e8ec;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  display:flex;justify-content:center;align-items:center;
  touch-action:none;-webkit-user-select:none;user-select:none;
  overflow:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#1a1a2e);
  background-size:400% 400%;
  animation:gradientBG 18s ease infinite;
}
body::after{
  content:'';position:fixed;inset:-50%;z-index:-1;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(120,80,200,.2) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(255,100,100,.15) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(50,150,255,.12) 0%,transparent 50%);
  animation:orbFloat 25s ease-in-out infinite;
}
@keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes orbFloat{
  0%{transform:translate(0,0) rotate(0deg)}
  33%{transform:translate(4%,4%) rotate(120deg)}
  66%{transform:translate(-4%,-2%) rotate(240deg)}
  100%{transform:translate(0,0) rotate(360deg)}
}
.game-wrapper{width:100%;max-width:500px;padding:16px;display:flex;flex-direction:column;gap:14px}
.header{display:flex;justify-content:space-between;align-items:center;gap:10px}
.title{
  font-size:clamp(1.8rem,5vw,2.4rem);font-weight:800;letter-spacing:-1.5px;
  background:linear-gradient(135deg,#f7d875,#f5a623,#f7d875);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShimmer 4s ease-in-out infinite;
}
@keyframes titleShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.scores{display:flex;gap:8px}
.score-box{
  background:rgba(255,255,255,.05);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:6px 16px;text-align:center;
  min-width:75px;transition:border-color .3s;
}
.score-box:hover{border-color:rgba(255,255,255,.15)}
.score-box .label{font-size:.6rem;text-transform:uppercase;color:#8888a0;letter-spacing:1px;font-weight:600}
.score-box .value{font-size:1.25rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.btn-row{display:flex;gap:8px;justify-content:flex-end}
.btn{
  background:rgba(255,255,255,.06);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);color:#ccc;font-size:.8rem;font-weight:600;
  padding:8px 18px;border-radius:10px;cursor:pointer;
  transition:background .2s,transform .1s,border-color .2s,box-shadow .2s;
  font-family:inherit;letter-spacing:.3px;
}
.btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.15);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.btn:active{transform:scale(.94)}
.btn.primary{
  background:linear-gradient(135deg,#f5a623,#e8961e);
  border-color:rgba(245,166,35,.3);color:#0b0a16;font-weight:700;
}
.btn.primary:hover{background:linear-gradient(135deg,#f7b83d,#f5a623);border-color:rgba(245,166,35,.5);box-shadow:0 4px 20px rgba(245,166,35,.25)}
.board-container{
  position:relative;
  background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:8px;
  transition:border-color .3s;
}
.board-container:hover{border-color:rgba(255,255,255,.12)}
.board{position:relative;width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-radius:8px}
.cell{background:rgba(255,255,255,.035);border-radius:8px;border:1px solid rgba(255,255,255,.03)}
.tile-container{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.tile{
  position:absolute;display:flex;justify-content:center;align-items:center;
  font-weight:800;border-radius:8px;
  transition:top .13s cubic-bezier(.25,.46,.45,.94),left .13s cubic-bezier(.25,.46,.45,.94);
  z-index:10;
  text-shadow:0 1px 3px rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.08);
}
.tile.pop{animation:tilePop .22s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes tilePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.tile.merged{z-index:20;animation:mergeGlow .35s ease-out forwards}
@keyframes mergeGlow{
  0%{transform:scale(1);filter:brightness(1)}
  35%{transform:scale(1.15);filter:brightness(1.4)}
  65%{transform:scale(.97)}
  100%{transform:scale(1);filter:brightness(1)}
}
.tile-2{background:linear-gradient(135deg,#a8e6cf,#7ecba1);color:#1a2e1a;box-shadow:0 0 18px rgba(168,230,207,.25)}
.tile-4{background:linear-gradient(135deg,#ffd3b6,#ffb08a);color:#3d2215;box-shadow:0 0 18px rgba(255,211,182,.25)}
.tile-8{background:linear-gradient(135deg,#ffb347,#ff8e53);color:#fff;box-shadow:0 0 20px rgba(255,179,71,.3)}
.tile-16{background:linear-gradient(135deg,#f59563,#e67e45);color:#fff;box-shadow:0 0 20px rgba(245,149,99,.3)}
.tile-32{background:linear-gradient(135deg,#f67c5f,#e8654a);color:#fff;box-shadow:0 0 22px rgba(246,124,95,.35)}
.tile-64{background:linear-gradient(135deg,#f65e3b,#e04d2a);color:#fff;box-shadow:0 0 24px rgba(246,94,59,.35)}
.tile-128{background:linear-gradient(135deg,#edcf72,#e8c24a);color:#2e2812;box-shadow:0 0 28px rgba(237,207,114,.25)}
.tile-256{background:linear-gradient(135deg,#edcc61,#e8bc3a);color:#2e2812;box-shadow:0 0 32px rgba(237,204,97,.3)}
.tile-512{background:linear-gradient(135deg,#edc850,#e8b82a);color:#2e2812;box-shadow:0 0 36px rgba(237,200,80,.35)}
.tile-1024{background:linear-gradient(135deg,#edc53f,#e8b01a);color:#2e2812;box-shadow:0 0 40px rgba(237,197,63,.4)}
.tile-2048{background:linear-gradient(135deg,#edc22e,#e8a810);color:#2e2812;box-shadow:0 0 50px rgba(237,194,46,.5);border-color:rgba(237,194,46,.3)}
.tile-4096{background:linear-gradient(135deg,#b885e0,#a060d0);color:#fff;box-shadow:0 0 40px rgba(184,133,224,.35)}
.tile-8192{background:linear-gradient(135deg,#a06cdb,#884fc0);color:#fff;box-shadow:0 0 40px rgba(160,108,219,.35)}
.tile-16384{background:linear-gradient(135deg,#8a5ec7,#7038b0);color:#fff;box-shadow:0 0 45px rgba(138,94,199,.4)}
.tile-32768{background:linear-gradient(135deg,#6d45a3,#5530a0);color:#fff;box-shadow:0 0 45px rgba(109,69,163,.4)}
.tile-65536{background:linear-gradient(135deg,#5a3590,#452080);color:#fff;box-shadow:0 0 50px rgba(90,53,144,.45)}
.tile-super{background:linear-gradient(135deg,#3d2370,#2a1060);color:#fff;box-shadow:0 0 50px rgba(61,35,112,.45)}

.game-overlay{
  position:absolute;top:8px;left:8px;right:8px;bottom:8px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(11,10,22,.7);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-radius:12px;z-index:100;opacity:0;pointer-events:none;
  transition:opacity .5s ease;
}
.game-overlay.active{opacity:1;pointer-events:auto}
.game-overlay h2{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.game-overlay p{color:#b0b0c0;margin-bottom:18px;font-size:.95rem;text-align:center;max-width:280px}
.game-overlay .btn{font-size:.95rem;padding:10px 32px;border-radius:12px}
.state-win h2{background:linear-gradient(135deg,#f7d875,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.state-lose h2{color:#e74c5c}


@media(max-width:420px){
  .game-wrapper{padding:10px;gap:10px}
  .title{font-size:1.6rem}
  .score-box{min-width:62px;padding:4px 10px}
  .score-box .value{font-size:1.05rem}
  .board-container{padding:5px;border-radius:12px}
  .board,.tile-container{border-radius:6px}
  .board{gap:5px}
  .game-overlay{top:5px;left:5px;right:5px;bottom:5px;border-radius:10px}
  .tile{font-size:1.5rem}
  .tile-128,.tile-256,.tile-512{font-size:80%}
  .tile-1024,.tile-2048,.tile-4096{font-size:65%}
  .tile-8192,.tile-16384{font-size:55%}
  .tile-32768,.tile-65536,.tile-super{font-size:40%}
}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn" id="undoBtn">↩ Undo</button>
    <button class="btn primary" id="newGameBtn">New Game</button>
  </div>
  <div class="board-container">
    <div class="board" id="board">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="tile-container" id="tileContainer"></div>
    </div>
    <div class="game-overlay" id="overlay">
      <h2 id="overlayTitle">Game Over</h2>
      <p id="overlayMsg">No more moves available.</p>
      <button class="btn primary" id="overlayBtn">Try Again</button>
    </div>
  </div>
</div>
<script>
(function(){
const SIZE = 4;
const WIN_VAL = 2048;
const MAX_UNDO = 20;

let grid = [], score = 0, best = 0, displayScore = 0;
let over = false, won = false, keepPlaying = false, dirChanged = true;
let tileId = 0;
let prevStates = [];

const boardEl = document.getElementById('board');
const container = document.getElementById('tileContainer');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg = document.getElementById('overlayMsg');
const overlayBtn = document.getElementById('overlayBtn');
const newGameBtn = document.getElementById('newGameBtn');
const undoBtn = document.getElementById('undoBtn');

// Audio
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq,dur,type='sine',vol=.08,startOff=0){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime+startOff);
    gain.gain.setValueAtTime(vol,ctx.currentTime+startOff);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+startOff+dur);
    osc.start(ctx.currentTime+startOff);osc.stop(ctx.currentTime+startOff+dur);
  }catch(e){}
}
function playMoveSound(){playTone(280,.08,'sine',.06)}
function playMergeSound(){playTone(440,.06,'sine',.08);playTone(660,.08,'sine',.06,.06)}
function playWinSound(){playTone(523,.12,'sine',.08);setTimeout(()=>playTone(659,.12,'sine',.08),130);setTimeout(()=>playTone(784,.18,'sine',.08),260)}
function playGameOverSound(){playTone(400,.15,'sawtooth',.05);setTimeout(()=>playTone(300,.15,'sawtooth',.05),180);setTimeout(()=>playTone(200,.25,'sawtooth',.05),360)}

// Best score
function loadBest(){try{const v=localStorage.getItem('g2048best');if(v)best=+v;else best=0}catch(e){best=0}}
function saveBest(){try{localStorage.setItem('g2048best',best)}catch(e){}}
loadBest();bestEl.textContent=best;

function emptyGrid(){return Array.from({length:SIZE},()=>Array(SIZE).fill(null))}
function cloneGrid(g){return g.map(r=>[...r])}

function getEmptyCells(g){
  const cells=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!g[r][c])cells.push({r,c});
  return cells;
}

function addTile(g){
  const cells=getEmptyCells(g);
  if(!cells.length)return null;
  const {r,c}=cells[Math.floor(Math.random()*cells.length)];
  const val=Math.random()<.9?2:4;
  const t={id:tileId++,val,merged:false};
  g[r][c]=t;
  return t;
}

function slideAndMergeRow(row){
  let arr=row.filter(Boolean);
  let res=[];
  let i=0;
  while(i<arr.length){
    if(i+1<arr.length&&arr[i].val===arr[i+1].val){
      const newVal=arr[i].val*2;
      const t={id:tileId++,val:newVal,merged:true};
      score+=newVal;
      res.push(t);
      i+=2;
    }else{
      res.push(arr[i]);
      i++;
    }
  }
  while(res.length<SIZE)res.push(null);
  return res;
}

function extractCol(g,c){const col=[];for(let r=0;r<SIZE;r++)col.push(g[r][c]);return col}
function setCol(g,c,col){for(let r=0;r<SIZE;r++)g[r][c]=col[r]}

function move(g,dir){
  const ng=cloneGrid(g);
  let moved=false;
  function detectMove(oldRow,newRow){
    for(let c=0;c<SIZE;c++){
      if((oldRow[c]&&!newRow[c])||(!oldRow[c]&&newRow[c])||(oldRow[c]&&newRow[c]&&oldRow[c].id!==newRow[c].id))
        moved=true;
    }
  }
  if(dir===3){
    for(let r=0;r<SIZE;r++){const old=[...ng[r]];ng[r]=slideAndMergeRow(ng[r]);detectMove(old,ng[r])}
  }else if(dir===1){
    for(let r=0;r<SIZE;r++){
      const old=[...ng[r]];
      const rev=[...ng[r]].reverse();
      const slid=slideAndMergeRow(rev);
      ng[r]=[...slid].reverse();
      detectMove(old,ng[r]);
    }
  }else if(dir===0){
    for(let c=0;c<SIZE;c++){
      const old=extractCol(ng,c);
      const slid=slideAndMergeRow(old);
      setCol(ng,c,slid);
      detectMove(old,slid);
    }
  }else if(dir===2){
    for(let c=0;c<SIZE;c++){
      const old=extractCol(ng,c);
      const rev=[...old].reverse();
      const slid=slideAndMergeRow(rev);
      const res=[...slid].reverse();
      setCol(ng,c,res);
      detectMove(old,res);
    }
  }
  return {grid:ng,moved};
}

function canMove(g){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!g[r][c])return true;
    if(c+1<SIZE&&g[r][c].val===g[r][c+1].val)return true;
    if(r+1<SIZE&&g[r][c].val===g[r+1][c].val)return true;
  }
  return false;
}

function checkGameOver(g){
  if(getEmptyCells(g).length>0)return false;
  return !canMove(g);
}

function saveState(){
  if(prevStates.length>=MAX_UNDO)prevStates.shift();
  prevStates.push({grid:cloneGrid(grid),score});
}

function undo(){
  if(!prevStates.length||over)return;
  const state=prevStates.pop();
  grid=state.grid;
  score=state.score;
  updateScore();
  renderTiles();
}

function handleMove(dir){
  if(over||!dirChanged)return;
  dirChanged=false;
  const result=move(grid,dir);
  if(!result.moved){dirChanged=true;return;}
  saveState();
  grid=result.grid;
  addTile(grid);

  let hasMerge=false;
  for(let r=0;r<SIZE&&!hasMerge;r++)for(let c=0;c<SIZE&&!hasMerge;c++)if(grid[r][c]&&grid[r][c].merged)hasMerge=true;
  if(hasMerge)playMergeSound();else playMoveSound();

  updateScore();
  renderTiles();

  if(!won&&!keepPlaying){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      if(grid[r][c]&&grid[r][c].val>=WIN_VAL){
        won=true;showWin();playWinSound();
        if(checkGameOver(grid)){
          overlayBtn.onclick=()=>{
            overlay.classList.remove('active');keepPlaying=true;
            over=true;showGameOver();playGameOverSound();
          };
        }
        setTimeout(()=>{dirChanged=true},400);
        return;
      }
    }
  }
  if(checkGameOver(grid)){over=true;showGameOver();playGameOverSound();setTimeout(()=>{dirChanged=true},400);return;}
  setTimeout(()=>{dirChanged=true},200);
}

function showWin(){
  overlayTitle.textContent='You Win!';
  overlayMsg.textContent='You reached 2048! Keep going or start a new game.';
  overlayBtn.textContent='Keep Going';
  overlay.className='game-overlay active state-win';
  overlayBtn.onclick=()=>{overlay.classList.remove('active');keepPlaying=true;};
}

function showGameOver(){
  overlayTitle.textContent='Game Over';
  overlayMsg.textContent='No more moves available.';
  overlayBtn.textContent='Try Again';
  overlay.className='game-overlay active state-lose';
  overlayBtn.onclick=()=>{init();};
}

// Score animation
let animFrameId=null;
function updateScore(){
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  const start=displayScore;
  const target=score;
  const diff=target-start;
  if(diff===0){scoreEl.textContent=target;return;}
  const duration=Math.min(Math.max(Math.abs(diff)*12,150),500);
  const t0=performance.now();
  function tick(now){
    const p=Math.min((now-t0)/duration,1);
    const eased=1-Math.pow(1-p,3);
    displayScore=Math.round(start+diff*eased);
    scoreEl.textContent=displayScore;
    if(p<1)animFrameId=requestAnimationFrame(tick);
    else{displayScore=target;scoreEl.textContent=target;animFrameId=null;}
  }
  animFrameId=requestAnimationFrame(tick);
  if(score>best){best=score;bestEl.textContent=best;saveBest();}
}

function getTileSize(){
  const rect=boardEl.getBoundingClientRect();
  const gap=window.innerWidth<=420?5:8;
  const totalGaps=(SIZE-1)*gap;
  const tileSize=(rect.width-totalGaps)/SIZE;
  return{tileSize,gap};
}

function pos(r,c,ts){return{left:c*(ts.tileSize+ts.gap),top:r*(ts.tileSize+ts.gap),size:ts.tileSize}}

const tileEls=new Map();

function renderTiles(){
  const ts=getTileSize();
  const existing=new Set();
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const t=grid[r][c];
    if(!t)continue;
    existing.add(t.id);
    const p=pos(r,c,ts);
    let el=tileEls.get(t.id);
    if(!el){
      el=document.createElement('div');
      tileEls.set(t.id,el);
      container.appendChild(el);
      el.style.transition='none';
      el.style.left=p.left+'px';
      el.style.top=p.top+'px';
      el.style.width=p.size+'px';
      el.style.height=p.size+'px';
      void el.offsetHeight;
      el.style.transition='';
      const digits=String(t.val).length;
      const maxFs=digits<=3?50:digits<=4?38:28;
      el.style.fontSize=Math.min(p.size*.42,maxFs)+'px';
      el.textContent=t.val;
      const tc=`tile-${t.val<=65536?t.val:'super'}`;
      const anim=t.merged?'merged':'pop';
      el.className=`tile ${tc} ${anim}`;
      el.addEventListener('animationend',()=>{el.classList.remove(anim)},{once:true});
    }else{
      el.style.left=p.left+'px';
      el.style.top=p.top+'px';
      el.style.width=p.size+'px';
      el.style.height=p.size+'px';
      const digits=String(t.val).length;
      const maxFs=digits<=3?50:digits<=4?38:28;
      el.style.fontSize=Math.min(p.size*.42,maxFs)+'px';
      if(parseInt(el.textContent)!==t.val){
        el.textContent=t.val;
        const tc=`tile-${t.val<=65536?t.val:'super'}`;
        el.className=`tile ${tc} merged`;
        el.addEventListener('animationend',()=>{el.classList.remove('merged')},{once:true});
      }
    }
  }
  for(const[id,el]of tileEls){
    if(!existing.has(id)){el.remove();tileEls.delete(id);}
  }
}

// Input
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!dirChanged)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(Math.max(adx,ady)<20)return;
  let dir;
  if(adx>ady){dir=dx>0?1:3}else{dir=dy>0?2:0}
  handleMove(dir);
},{passive:true});

document.addEventListener('keydown',e=>{
  if(!dirChanged)return;
  let dir=-1;
  const map={ArrowUp:0,ArrowRight:1,ArrowDown:2,ArrowLeft:3};
  dir=map[e.key]!==undefined?map[e.key]:-1;
  if(dir>=0){e.preventDefault();handleMove(dir);}
});

newGameBtn.addEventListener('click',()=>{init();});
undoBtn.addEventListener('click',()=>{undo();});

function init(){
  grid=emptyGrid();score=0;displayScore=0;over=false;won=false;keepPlaying=false;
  dirChanged=true;prevStates=[];
  overlay.classList.remove('active','state-win','state-lose');
  updateScore();
  for(const el of tileEls.values())el.remove();
  tileEls.clear();
  addTile(grid);
  addTile(grid);
  renderTiles();
}

init();

let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{renderTiles();},100);
});
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:#0f0f12;
  color:#e0e0e0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  display:flex;justify-content:center;align-items:center;
  touch-action:none;-webkit-user-select:none;user-select:none
}
.game-wrapper{
  width:100%;max-width:500px;padding:16px;
  display:flex;flex-direction:column;gap:12px
}
.header{
  display:flex;justify-content:space-between;align-items:center;gap:10px
}
.title{font-size:2.2rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#f7d875,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.scores{display:flex;gap:8px}
.score-box{
  background:#1a1a24;border-radius:8px;padding:6px 14px;text-align:center;min-width:70px
}
.score-box .label{font-size:.65rem;text-transform:uppercase;color:#888;letter-spacing:.5px}
.score-box .value{font-size:1.2rem;font-weight:700;color:#fff}
.btn-row{display:flex;gap:8px;justify-content:flex-end}
.btn{
  background:#1a1a24;border:none;color:#ccc;font-size:.85rem;font-weight:600;
  padding:8px 18px;border-radius:8px;cursor:pointer;transition:background .15s,transform .1s
}
.btn:hover{background:#2a2a38}
.btn:active{transform:scale(.95)}
.btn.primary{background:#f5a623;color:#0f0f12}
.btn.primary:hover{background:#f7b83d}
.board-container{position:relative;border-radius:12px;background:#1a1a24;padding:8px;touch-action:none}
.board{position:relative;width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#1a1a24;border-radius:8px}
.cell{background:#252531;border-radius:6px;aspect-ratio:1}
.tile-container{position:absolute;top:8px;left:8px;right:8px;bottom:8px;pointer-events:none}
.tile{
  position:absolute;display:flex;justify-content:center;align-items:center;
  font-weight:800;border-radius:6px;transition:top .12s ease,left .12s ease;
  z-index:10;overflow:hidden
}
.tile.pop{animation:pop .2s ease}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.tile.merged{z-index:20;animation:mergePop .25s ease}
@keyframes mergePop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
.game-overlay{
  position:absolute;top:8px;left:8px;right:8px;bottom:8px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(15,15,18,.82);border-radius:8px;z-index:100;opacity:0;pointer-events:none;
  transition:opacity .4s ease
}
.game-overlay.active{opacity:1;pointer-events:auto}
.game-overlay h2{font-size:2.4rem;font-weight:800;margin-bottom:8px}
.game-overlay p{color:#aaa;margin-bottom:16px;font-size:.95rem}
.game-overlay .btn{font-size:1rem;padding:10px 28px}
.state-win h2{color:#f5a623}
.state-lose h2{color:#e74c3c}
/* tile colors */
.tile-2{background:#e6d5b8;color:#1a1a24}
.tile-4{background:#ecd5a0;color:#1a1a24}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}
.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#1a1a24;font-size:90%}
.tile-256{background:#edcc61;color:#1a1a24;font-size:90%}
.tile-512{background:#edc850;color:#1a1a24;font-size:90%}
.tile-1024{background:#edc53f;color:#1a1a24;font-size:75%}
.tile-2048{background:#edc22e;color:#1a1a24;font-size:75%;box-shadow:0 0 30px 10px rgba(237,194,46,.3)}
.tile-4096{background:#b885e0;color:#f9f6f2;font-size:75%}
.tile-8192{background:#a06cdb;color:#f9f6f2;font-size:65%}
.tile-16384{background:#8a5ec7;color:#f9f6f2;font-size:55%}
.tile-32768{background:#6d45a3;color:#f9f6f2;font-size:50%}
.tile-65536{background:#5a3590;color:#f9f6f2;font-size:45%}
.tile-super{background:#3d2370;color:#f9f6f2;font-size:40%}
@media(max-width:420px){
  .game-wrapper{padding:10px;gap:8px}
  .title{font-size:1.7rem}
  .score-box{min-width:60px;padding:4px 10px}
  .score-box .value{font-size:1rem}
  .board,.tile-container{border-radius:6px}
  .board{gap:5px;padding:0}
  .board-container{padding:5px}
  .tile-container{top:5px;left:5px;right:5px;bottom:5px}
  .game-overlay{top:5px;left:5px;right:5px;bottom:5px}
  .tile{font-size:1.6rem}
  .tile-128,.tile-256,.tile-512{font-size:80%}
  .tile-1024,.tile-2048,.tile-4096{font-size:65%}
  .tile-8192,.tile-16384{font-size:55%}
  .tile-32768,.tile-65536,.tile-super{font-size:40%}
}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn primary" id="newGameBtn">New Game</button>
  </div>
  <div class="board-container">
    <div class="board" id="board">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="tile-container" id="tileContainer"></div>
    <div class="game-overlay" id="overlay">
      <h2 id="overlayTitle">Game Over</h2>
      <p id="overlayMsg">You lost!</p>
      <button class="btn primary" id="overlayBtn">Try Again</button>
    </div>
  </div>
</div>
<script>
(function(){
const SIZE=4;
const WIN_VAL=2048;

let grid=[], score=0, best=0, over=false, won=false, keepPlaying=false;
let tileId=0;

const boardEl=document.getElementById('board');
const container=document.getElementById('tileContainer');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const overlay=document.getElementById('overlay');
const overlayTitle=document.getElementById('overlayTitle');
const overlayMsg=document.getElementById('overlayMsg');
const overlayBtn=document.getElementById('overlayBtn');

function loadBest(){try{const v=localStorage.getItem('g2048best');if(v)best=+v;else best=0}catch(e){best=0}}
function saveBest(){try{localStorage.setItem('g2048best',best)}catch(e){}}
loadBest();bestEl.textContent=best;

function emptyGrid(){return Array.from({length:SIZE},()=>Array(SIZE).fill(null))}

function cloneGrid(g){return g.map(row=>[...row])}

function getEmptyCells(g){
  const cells=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!g[r][c])cells.push({r,c});
  return cells;
}

function addTile(g){
  const cells=getEmptyCells(g);
  if(!cells.length)return null;
  const {r,c}=cells[Math.floor(Math.random()*cells.length)];
  const val=Math.random()<.9?2:4;
  const t={id:tileId++,val};
  g[r][c]=t;
  return t;
}

function init(){
  grid=emptyGrid();score=0;over=false;won=false;keepPlaying=false;
  overlay.classList.remove('active','state-win','state-lose');
  updateScore();
  for(const el of tileEls.values())el.remove();
  tileEls.clear();
  const t1=addTile(grid);
  const t2=addTile(grid);
  renderTiles();
}

function slideAndMergeRow(row){
  let arr=row.filter(Boolean);
  let res=[];
  let i=0;
  while(i<arr.length){
    if(i+1<arr.length&&arr[i].val===arr[i+1].val){
      const newVal=arr[i].val*2;
      const t={id:tileId++,val:newVal,merged:true};
      score+=newVal;
      res.push(t);
      i+=2;
    }else{
      res.push(arr[i]);
      i++;
    }
  }
  while(res.length<SIZE)res.push(null);
  return res;
}

function extractCol(g,c){
  const col=[];
  for(let r=0;r<SIZE;r++)col.push(g[r][c]);
  return col;
}

function setCol(g,c,col){for(let r=0;r<SIZE;r++)g[r][c]=col[r];}

function move(g,dir){
  const ng=cloneGrid(g);
  let moved=false;
  if(dir===3){ // left
    for(let r=0;r<SIZE;r++){
      const old=[...ng[r]];
      ng[r]=slideAndMergeRow(ng[r]);
      for(let c=0;c<SIZE;c++){
        if(old[c]&&!ng[r][c])moved=true;
        else if(!old[c]&&ng[r][c])moved=true;
        else if(old[c]&&ng[r][c]&&old[c].id!==ng[r][c].id)moved=true;
      }
    }
  }else if(dir===1){ // right
    for(let r=0;r<SIZE;r++){
      const rev=[...ng[r]].reverse();
      const slid=slideAndMergeRow(rev);
      const res=[...slid].reverse();
      for(let c=0;c<SIZE;c++){
        if(ng[r][c]&&!res[c])moved=true;
        else if(!ng[r][c]&&res[c])moved=true;
        else if(ng[r][c]&&res[c]&&ng[r][c].id!==res[c].id)moved=true;
      }
      ng[r]=res;
    }
  }else if(dir===0){ // up
    for(let c=0;c<SIZE;c++){
      const col=extractCol(ng,c);
      const slid=slideAndMergeRow(col);
      for(let r=0;r<SIZE;r++){
        if(ng[r][c]&&!slid[r])moved=true;
        else if(!ng[r][c]&&slid[r])moved=true;
        else if(ng[r][c]&&slid[r]&&ng[r][c].id!==slid[r].id)moved=true;
      }
      setCol(ng,c,slid);
    }
  }else if(dir===2){ // down
    for(let c=0;c<SIZE;c++){
      const col=extractCol(ng,c).reverse();
      const slid=slideAndMergeRow(col);
      const res=[...slid].reverse();
      for(let r=0;r<SIZE;r++){
        if(ng[r][c]&&!res[r])moved=true;
        else if(!ng[r][c]&&res[r])moved=true;
        else if(ng[r][c]&&res[r]&&ng[r][c].id!==res[r].id)moved=true;
      }
      setCol(ng,c,res);
    }
  }
  return {grid:ng,moved};
}

function canMove(g){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!g[r][c])return true;
    if(c+1<SIZE&&g[r][c].val===g[r][c+1].val)return true;
    if(r+1<SIZE&&g[r][c].val===g[r+1][c].val)return true;
  }
  return false;
}

function checkGameOver(g){
  if(getEmptyCells(g).length>0)return false;
  return !canMove(g);
}

function handleMove(dir){
  if(over||!dirChanged)return;
  dirChanged=false;
  const result=move(grid,dir);
  if(!result.moved){dirChanged=true;return;}
  grid=result.grid;
  const newTile=addTile(grid);
  updateScore();
  renderTiles();
  // check win
  if(!won&&!keepPlaying){
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      if(grid[r][c]&&grid[r][c].val===WIN_VAL){
        won=true;showWin();return;
      }
    }
  }
  if(checkGameOver(grid)){over=true;showGameOver();return;}
  setTimeout(()=>{dirChanged=true;},200);
}
let dirChanged=true;
function showWin(){
  overlayTitle.textContent='You Win!';
  overlayMsg.textContent='You reached 2048! Keep going or start a new game.';
  overlayBtn.textContent='Keep Going';
  overlay.className='game-overlay active state-win';
  overlayBtn.onclick=()=>{
    overlay.classList.remove('active');keepPlaying=true;
  };
}

function showGameOver(){
  overlayTitle.textContent='Game Over';
  overlayMsg.textContent='No more moves available.';
  overlayBtn.textContent='Try Again';
  overlay.className='game-overlay active state-lose';
  overlayBtn.onclick=()=>{init();};
}

function updateScore(){
  scoreEl.textContent=score;
  if(score>best){best=score;bestEl.textContent=best;saveBest();}
}

function collectTiles(){
  const tiles=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c])tiles.push(grid[r][c]);
  return tiles;
}

const tileEls=new Map();

function getTileSize(){
  const rect=boardEl.getBoundingClientRect();
  const gap=window.innerWidth<=420?5:8;
  const pad=window.innerWidth<=420?5:8;
  const totalGaps=(SIZE-1)*gap;
  const avail=rect.width-pad*2;
  const tileSize=(avail-totalGaps)/SIZE;
  return {tileSize,gap,pad,avail};
}

function pos(r,c){const ts=getTileSize();return {left:c*(ts.tileSize+ts.gap),top:r*(ts.tileSize+ts.gap),size:ts.tileSize}}

function renderTiles(){
  const ts=getTileSize();
  const dim=ts.avail;
  container.style.width=dim+'px';
  container.style.height=dim+'px';
  const existing=new Set();
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const t=grid[r][c];
    if(!t)continue;
    existing.add(t.id);
    const p=pos(r,c);
    let el=tileEls.get(t.id);
    if(!el){
      el=document.createElement('div');
      tileEls.set(t.id,el);
      container.appendChild(el);
      el.style.width=p.size+'px';
      el.style.height=p.size+'px';
      el.style.left=p.left+'px';
      el.style.top=p.top+'px';
      const digits=String(t.val).length;
      const maxFs=digits<=3?50:digits<=4?38:28;
      const fs=Math.min(p.size*.42,maxFs);
      el.style.fontSize=fs+'px';
      el.textContent=t.val;
      const tc=`tile-${t.val<=65536?t.val:'super'}`;
      const anim=t.merged?'merged':'pop';
      el.className=`tile ${tc} ${anim}`;
      el.addEventListener('animationend',()=>{el.classList.remove(anim)},{once:true});
    }else{
      el.style.left=p.left+'px';
      el.style.top=p.top+'px';
      if(parseInt(el.textContent)!==t.val){
        el.textContent=t.val;
        const tc=`tile-${t.val<=65536?t.val:'super'}`;
        el.className=`tile ${tc} merged`;
        el.addEventListener('animationend',()=>{el.classList.remove('merged')},{once:true});
      }
    }
  }
  for(const [id,el] of tileEls){
    if(!existing.has(id)){el.remove();tileEls.delete(id);}
  }
}

// input handling
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!dirChanged)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(Math.max(adx,ady)<20)return;
  let dir;
  if(adx>ady){dir=dx>0?1:3}else{dir=dy>0?2:0}
  handleMove(dir);
},{passive:true});

document.addEventListener('keydown',e=>{
  if(!dirChanged)return;
  let dir=-1;
  switch(e.key){
    case 'ArrowUp':dir=0;break;
    case 'ArrowRight':dir=1;break;
    case 'ArrowDown':dir=2;break;
    case 'ArrowLeft':dir=3;break;
  }
  if(dir>=0){e.preventDefault();handleMove(dir);}
});

document.getElementById('newGameBtn').addEventListener('click',()=>{init();});

init();

// handle resize
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{renderTiles();},100);
});
})();
</script>
</body>
</html>

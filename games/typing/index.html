<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#080012,#0a0a24,#0d0d30);color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;overflow-x:hidden}
#app{width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;position:relative}
.top-bar{width:100%;max-width:700px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.back-link{color:#8888cc;text-decoration:none;font-size:14px;padding:6px 14px;border-radius:8px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);transition:all .2s}
.back-link:hover{color:#aaaaff;background:rgba(255,255,255,0.1)}
.mute-btn{font-size:22px;cursor:pointer;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;transition:all .2s;user-select:none}
.mute-btn:hover{background:rgba(255,255,255,0.12)}
h1{font-size:28px;font-weight:700;background:linear-gradient(90deg,#43e97b,#38f9d7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}
.game-container{width:100%;max-width:620px;background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.stats{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.stat-box{flex:1;min-width:70px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;text-align:center}
.stat-box .label{font-size:11px;text-transform:uppercase;color:#888;letter-spacing:0.5px}
.stat-box .value{font-size:22px;font-weight:700;color:#e0e0e0;margin-top:2px}
.stat-box .value.wpm{background:linear-gradient(90deg,#43e97b,#38f9d7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-box .value.acc{color:#f9ca24}
.stat-box .value.time{color:#ee5a24}
.time-controls{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.time-controls button{padding:6px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);color:#ccc;font-family:inherit}
.time-controls button:hover{background:rgba(255,255,255,0.14)}
.time-controls button.active{background:rgba(0,200,150,0.2);border-color:rgba(0,200,150,0.35);color:#5fffcb}
.word-display{margin:20px 0;min-height:80px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;padding:16px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.word-display .word{font-size:clamp(18px,4vw,28px);font-weight:500;padding:2px 6px;border-radius:4px;transition:all .15s;letter-spacing:0.5px;font-family:'Courier New',monospace}
.word-display .word.current{background:rgba(100,100,255,0.15);border-left:2px solid rgba(100,150,255,0.5);padding-left:8px}
.word-display .word.done{color:#555;font-size:clamp(14px,3vw,20px)}
.word-display .word .char{transition:color .1s}
.word-display .word .char.correct{color:#43e97b}
.word-display .word .char.incorrect{color:#ff6b6b;text-decoration:underline;text-decoration-color:#ff6b6b}
.word-display .word .char.current-char{animation:blink 0.8s infinite;border-right:2px solid #88bbff}
@keyframes blink{0%,100%{border-color:#88bbff}50%{border-color:transparent}}
.input-area{display:flex;gap:10px;align-items:center;margin-bottom:10px}
#wordInput{flex:1;padding:12px 16px;border:2px solid rgba(255,255,255,0.1);border-radius:12px;background:rgba(255,255,255,0.05);color:#e0e0e0;font-size:18px;font-family:'Courier New',monospace;outline:none;transition:border-color .2s}
#wordInput:focus{border-color:rgba(100,200,255,0.4)}
#wordInput:disabled{opacity:0.4}
.start-btn{padding:12px 28px;border:none;border-radius:12px;cursor:pointer;font-size:16px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);color:white;transition:all .3s;font-family:inherit;white-space:nowrap}

.start-btn.running{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.start-btn.finished{background:linear-gradient(135deg,#00b894,#00cec9)}

<script>
// ===== Audio Engine =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let sfxGain = null;
let musicNodes = [];
let isMuted = false;
let isMusicPlaying = false;

function initAudio(){
if(audioCtx) return;
audioCtx = new AudioCtx();
masterGain = audioCtx.createGain();
masterGain.gain.value = 0.22;
masterGain.connect(audioCtx.destination);
musicGain = audioCtx.createGain();
musicGain.gain.value = 0.55;
musicGain.connect(masterGain);
sfxGain = audioCtx.createGain();
sfxGain.gain.value = 0.7;
sfxGain.connect(masterGain);
}

function playNote(freq,duration,type,gainVal,connectTo){
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type||'sine';
osc.frequency.value = freq;
gain.gain.setValueAtTime(gainVal||0.15,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);
osc.connect(gain);
gain.connect(connectTo||sfxGain);
osc.start(audioCtx.currentTime);
osc.stop(audioCtx.currentTime+duration);
return {osc,gain};
}

function playSfxCorrect(){
if(!audioCtx||isMuted) return;
playNote(880,0.08,'sine',0.1);
}

function playSfxIncorrect(){
if(!audioCtx||isMuted) return;
playNote(200,0.15,'sawtooth',0.06);
}

function playSfxComplete(){
if(!audioCtx||isMuted) return;
const notes = [523,659,784,1047];
notes.forEach((f,i)=>{
setTimeout(()=>playNote(f,0.2,'triangle',0.12),i*100);
});
}

function playSfxWordComplete(){
if(!audioCtx||isMuted) return;
playNote(660,0.08,'sine',0.07);
}

// Procedural background music - lo-fi study beats inspired
function startMusic(){
if(!audioCtx||isMusicPlaying) return;
isMusicPlaying = true;
musicNodes = [];
const bpm = 85;
const beat = 60/bpm;
const notes = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25];
let bar = 0;

function scheduleLoop(){
if(!isMusicPlaying) return;
const now = audioCtx.currentTime;
const root = 220 + (bar%4)*11;

// Pad chord (sustained)
const pg = audioCtx.createGain();
pg.gain.setValueAtTime(0.05,now);
pg.gain.linearRampToValueAtTime(0.05,now+beat*8);
pg.connect(musicGain);
musicNodes.push(pg);
[0,4,7,12].forEach(semi=>{
const osc = audioCtx.createOscillator();
osc.type = 'sine';
osc.frequency.value = root * Math.pow(2,semi/12);
osc.connect(pg);
osc.start(now);
osc.stop(now+beat*8);
musicNodes.push(osc);
});

// Percussive kick-like (filtered noise + low osc)
for(let i=0;i<4;i++){
const kg = audioCtx.createGain();
kg.gain.setValueAtTime(0.12,now+i*beat*2);
kg.gain.exponentialRampToValueAtTime(0.001,now+i*beat*2+beat*0.5);
kg.connect(musicGain);
musicNodes.push(kg);
const kosc = audioCtx.createOscillator();
kosc.type = 'triangle';
kosc.frequency.value = 80;
kosc.connect(kg);
kosc.start(now+i*beat*2);
kosc.stop(now+i*beat*2+beat*0.5);
musicNodes.push(kosc);
}

// Hi-hat like (short noise bursts)
for(let i=0;i<8;i++){
if(i%2===0) continue;
const hg = audioCtx.createGain();
hg.gain.setValueAtTime(0.04,now+i*beat);
hg.gain.exponentialRampToValueAtTime(0.001,now+i*beat+beat*0.08);
hg.connect(musicGain);
musicNodes.push(hg);
const hosc = audioCtx.createOscillator();
hosc.type = 'square';
hosc.frequency.value = 1200;
hosc.connect(hg);
hosc.start(now+i*beat);
hosc.stop(now+i*beat+beat*0.08);
musicNodes.push(hosc);
}

// Random melodic notes
for(let i=0;i<4;i++){
const mg = audioCtx.createGain();
mg.gain.setValueAtTime(0.04,now+i*beat*2+beat*0.3);
mg.gain.exponentialRampToValueAtTime(0.001,now+i*beat*2+beat*0.7);
mg.connect(musicGain);
musicNodes.push(mg);
const idx = Math.floor(Math.random()*notes.length);
const mosc = audioCtx.createOscillator();
mosc.type = 'sine';
mosc.frequency.value = notes[idx]*1.5;
mosc.connect(mg);
mosc.start(now+i*beat*2+beat*0.3);
mosc.stop(now+i*beat*2+beat*0.7);
musicNodes.push(mosc);
}

bar++;
const next = now+beat*8;
const delay = Math.max(0,next-audioCtx.currentTime)*1000;
setTimeout(scheduleLoop,delay);
}
scheduleLoop();
}

function stopMusic(){
isMusicPlaying = false;
musicNodes.forEach(n=>{
try{n.disconnect()}catch(e){}
try{n.stop&&n.stop()}catch(e){}
});
musicNodes = [];
}

function toggleMute(){
isMuted = !isMuted;
document.getElementById('muteBtn').textContent = isMuted?'🔇':'🔊';
if(audioCtx){
masterGain.gain.value = isMuted?0:0.22;
}
if(!isMuted&&!isMusicPlaying&&audioCtx) startMusic();
}

// ===== Game State =====
let timeLimit = 60;
let timeRemaining = 60;
let isRunning = false;
let words = [];
let currentWordIdx = 0;
let currentCharIdx = 0;
let correctKeys = 0;
let incorrectKeys = 0;
let totalKeys = 0;
let wpmValues = [];
let timerInterval = null;
let topWpm = 0;

// ===== DOM refs =====
const wordDisplay = document.getElementById('wordDisplay');
const wordInput = document.getElementById('wordInput');
const startBtn = document.getElementById('startBtn');
const wpmDisplay = document.getElementById('wpmDisplay');
const accDisplay = document.getElementById('accDisplay');
const keystrokesDisplay = document.getElementById('keystrokesDisplay');
const timeDisplay = document.getElementById('timeDisplay');
const progressFill = document.getElementById('progressFill');
const resultScreen = document.getElementById('resultScreen');
const highScores = document.getElementById('highScores');
const hsContent = document.getElementById('hsContent');

// ===== Functions =====
function pickWords(count){
const shuffled = [...WORD_LIST].sort(()=>Math.random()-0.5);
return shuffled.slice(0,count);
}

function startGame(){
initAudio();
if(!isMusicPlaying) startMusic();
hideResult();
timeRemaining = timeLimit;
isRunning = true;
currentWordIdx = 0;
currentCharIdx = 0;
correctKeys = 0;
incorrectKeys = 0;
totalKeys = 0;
wpmValues = [];
words = pickWords(50);
wordInput.value = '';
wordInput.disabled = false;
wordInput.focus();
startBtn.textContent = 'Running';
startBtn.className = 'start-btn running';
updateStats();
renderWords();
startTimer();
}

function startTimer(){
clearInterval(timerInterval);
timerInterval = setInterval(()=>{
timeRemaining--;
updateStats();
if(timeRemaining<=0){
endGame();
}
},1000);
}

function endGame(){
isRunning = false;
clearInterval(timerInterval);
wordInput.disabled = true;
startBtn.textContent = 'Finished';
startBtn.className = 'start-btn finished';
playSfxComplete();
const wpm = calculateWpm();
const acc = totalKeys>0 ? Math.round((correctKeys/totalKeys)*100) : 100;
const elapsed = timeLimit;
topWpm = Math.max(topWpm,wpm);
showResult(wpm,acc);
saveScore(wpm,acc);
updateHighScores();
}

function calculateWpm(){
const elapsed = timeLimit;
const minutes = elapsed/60;
if(minutes<=0) return 0;
// WPM = (correct chars / 5) / minutes
const wpm = Math.round((correctKeys/5)/minutes);
return Math.max(0,wpm);
}

function renderWords(){
wordDisplay.innerHTML = '';
words.forEach((word,i)=>{
const span = document.createElement('span');
span.className = 'word';
if(i===currentWordIdx) span.classList.add('current');
else if(i<currentWordIdx) span.classList.add('done');
word.split('').forEach((ch,j)=>{
const cspan = document.createElement('span');
cspan.className = 'char';
cspan.textContent = ch;
if(i===currentWordIdx){
if(j<currentCharIdx){
cspan.classList.add('correct');
} else if(j===currentCharIdx){
cspan.classList.add('current-char');
}
}
span.appendChild(cspan);
});
wordDisplay.appendChild(span);
});
// Scroll current word into view
const currentEl = wordDisplay.querySelector('.word.current');
if(currentEl){
currentEl.scrollIntoView({block:'nearest',behavior:'smooth'});
}
}

function updateStats(){
const wpm = calculateWpm();
if(isRunning&&wpm>0) wpmValues.push(wpm);
const acc = totalKeys>0 ? Math.round((correctKeys/totalKeys)*100) : 100;
wpmDisplay.textContent = wpm;
accDisplay.textContent = acc+'%';
keystrokesDisplay.textContent = totalKeys;
timeDisplay.textContent = Math.max(0,timeRemaining);
const pct = ((timeLimit-timeRemaining)/timeLimit)*100;
progressFill.style.width = Math.min(100,pct)+'%';
}

function showResult(wpm,acc){
resultScreen.classList.add('show');
document.getElementById('resWpm').textContent = wpm;
document.getElementById('resTopWpm').textContent = topWpm;
document.getElementById('resAcc').textContent = acc+'%';
document.getElementById('resKeys').textContent = totalKeys;
document.getElementById('resCorrect').textContent = correctKeys;
document.getElementById('resIncorrect').textContent = incorrectKeys;
}

function hideResult(){
resultScreen.classList.remove('show');
}

function saveScore(wpm,acc){
let scores = [];
try{
const stored = localStorage.getItem('typingScores');
if(stored) scores = JSON.parse(stored);
}catch(e){}
scores.push({wpm,acc,date:new Date().toLocaleDateString(),time:timeLimit});
scores.sort((a,b)=>b.wpm-a.wpm);
scores = scores.slice(0,15);
try{
localStorage.setItem('typingScores',JSON.stringify(scores));
}catch(e){}
}

function updateHighScores(){
let scores = [];
try{
const stored = localStorage.getItem('typingScores');
if(stored) scores = JSON.parse(stored);
}catch(e){}
if(scores.length===0){
hsContent.innerHTML = '<p style="color:#666;text-align:center;font-size:13px">No scores yet</p>';
return;
}
let html = '<table><tr><th>#</th><th>WPM</th><th>Acc</th><th>Time</th><th>Date</th></tr>';
scores.forEach((s,i)=>{
html += `<tr><td class="rank">${i+1}</td><td class="hs-wpm">${s.wpm}</td><td class="hs-acc">${s.acc}%</td><td>${s.time||60}s</td><td class="hs-date">${s.date}</td></tr>`;
});
html += '</table>';
hsContent.innerHTML = html;
}

// ===== Input Handling =====
wordInput.addEventListener('input',function(e){
if(!isRunning) return;
const val = this.value;
if(val.length===0) return;
const lastChar = val[val.length-1];
const word = words[currentWordIdx];
if(!word) return;

if(lastChar===' '||val.endsWith(' ')){
// Word completed
const typed = val.trim();
if(typed===word){
correctKeys += word.length;
totalKeys += word.length;
playSfxWordComplete();
} else {
// Count correct chars
let correct = 0;
for(let i=0;i<Math.min(typed.length,word.length);i++){
if(typed[i]===word[i]) correct++;
}
incorrectKeys += Math.max(typed.length,word.length)-correct;
correctKeys += correct;
totalKeys += typed.length;
playSfxIncorrect();
}
currentWordIdx++;
currentCharIdx = 0;
this.value = '';
if(currentWordIdx>=words.length-5){
words = words.concat(pickWords(30));
}
renderWords();
updateStats();
return;
}

// Character by character
const charIdx = val.length-1;
currentCharIdx = val.length;
const expectedChar = word[charIdx];
if(!expectedChar){
playSfxIncorrect();
return;
}
if(lastChar===expectedChar){
playSfxCorrect();
} else {
playSfxIncorrect();
}
totalKeys++;
if(lastChar===expectedChar){
correctKeys++;
} else {
incorrectKeys++;
}
updateStats();
renderWords();
});

wordInput.addEventListener('keydown',function(e){
if(e.key==='Backspace'){
// Allow backspace but track it
}
if(!isRunning&&e.key==='Enter'){
startGame();
}
});

// ===== Time controls =====
document.querySelectorAll('.time-controls button').forEach(btn=>{
btn.addEventListener('click',function(){
document.querySelectorAll('.time-controls button').forEach(b=>b.classList.remove('active'));
this.classList.add('active');
timeLimit = parseInt(this.dataset.time);
timeRemaining = timeLimit;
timeDisplay.textContent = timeLimit;
if(!isRunning){
startBtn.textContent = 'Start';
startBtn.className = 'start-btn';
}
});
});

// ===== Event Listeners =====
document.getElementById('muteBtn').addEventListener('click',()=>{
if(!audioCtx) initAudio();
toggleMute();
});

document.addEventListener('click',()=>{
if(!audioCtx){
initAudio();
startMusic();
}
},{once:true});

startBtn.addEventListener('click',function(){
if(isRunning) return;
startGame();
});

document.getElementById('retryBtn').addEventListener('click',function(){
startGame();
});

document.getElementById('shareBtn').addEventListener('click',function(){
const wpm = document.getElementById('resWpm').textContent;
const acc = document.getElementById('resAcc').textContent;
if(navigator.share){
navigator.share({title:'Typing Speed Test',text:`I typed ${wpm} WPM with ${acc} accuracy!`});
} else {
navigator.clipboard.writeText(`Typing Speed Test: ${wpm} WPM with ${acc} accuracy!`);
document.getElementById('shareBtn').textContent = 'Copied!';
setTimeout(()=>document.getElementById('shareBtn').textContent='Share Score',2000);
}
});

// Init
updateStats();
updateHighScores();
</script>
</body>
</html>
